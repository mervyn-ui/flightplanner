          <div class="tl-detail-dates">✈ ${_tlFmtDate(t.dep_date)} ${t.dep_date.slice(0,4)} → ${_tlFmtDate(t.ret_date)} &nbsp;·&nbsp; ${t.duration} nights</div>
          <div class="tl-detail-airline">${t.airline}${t.dep_time ? " · " + t.dep_time : ""}</div>
        </div>
        <div class="tl-detail-price">€${t.price}</div>
        <a class="tl-detail-book" href="${bookUrl}" target="_blank" rel="noopener">Book →</a>
      </div>`;
    panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function _renderTimeline(trips, startStr, endStr) {
    const DAY     = 18;
    const BH      = 34;
    const BGAP    = 5;
    const HDR     = 36;
    const LLABEL  = 54;
    const SEC_HDR = 28;
    const SEC_GAP = 14;

    const t0 = new Date(startStr + "T00:00:00");
    const t1 = new Date(endStr   + "T00:00:00");
    const totalDays = Math.round((t1 - t0) / 86400000);

    const ORIGIN_ORDER = ["AMS","EIN","NRN","BRU"];
    const presentOrigins = [...new Set(trips.map(t => t.origin))];
    const uniqueOrigins = [
      ...ORIGIN_ORDER.filter(o => presentOrigins.includes(o)),
      ...presentOrigins.filter(o => !ORIGIN_ORDER.includes(o))
    ];

    // Filter: top 4 cheapest per month per origin
    const filteredTrips = [];
    uniqueOrigins.forEach(origin => {
      const byMonth = {};
      trips.filter(t => t.origin === origin).forEach(t => {
        const m = t.dep_date.slice(0, 7);
        (byMonth[m] = byMonth[m] || []).push(t);
      });
      Object.values(byMonth).forEach(monthTrips => {
        const top4 = [...monthTrips].sort((a, b) => a.price - b.price).slice(0, 4);
        filteredTrips.push(...top4);
      });
    });

    const prices = filteredTrips.map(t => t.price);
    const minP = Math.min(...prices), maxP = Math.max(...prices);

    const byOrigin = {};
    filteredTrips.forEach(t => { (byOrigin[t.origin] = byOrigin[t.origin] || []).push(t); });

    const placed = [];
    let currentY = HDR;
    let sectionsHTML = "", linesHTML = "";

    uniqueOrigins.forEach(origin => {
      const group = byOrigin[origin] || [];
      if (!group.length) return;

      sectionsHTML += `<div class="tl-section-hdr" style="top:${currentY}px;height:${SEC_HDR}px">${origin}</div>`;
      linesHTML    += `<div class="tl-section-line" style="left:${LLABEL}px;top:${currentY}px;width:${totalDays*DAY}px"></div>`;
      currentY += SEC_HDR;

      const sorted = [...group].sort((a, b) =>
        a.dep_date < b.dep_date ? -1 : a.dep_date > b.dep_date ? 1 : a.price - b.price
      );

      const rowFree = [];
      const laneTop = currentY;
      sorted.forEach(trip => {
        const depDay = Math.round((new Date(trip.dep_date + "T00:00:00") - t0) / 86400000);
        const x = LLABEL + depDay * DAY;
        const w = Math.max(trip.duration * DAY - 2, 16);
        let row = 0;
        while (rowFree[row] !== undefined && rowFree[row] > x) row++;
        rowFree[row] = x + w + 3;
        placed.push({ ...trip, x, w, y: laneTop + row * (BH + BGAP) });
      });

      currentY = laneTop + (rowFree.length || 1) * (BH + BGAP) + SEC_GAP;
    });

    const totalH = currentY + 4;
    const W = LLABEL + totalDays * DAY;

    const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    let headerHTML = "", ticksHTML = "";
    let prevM = -1;
    for (let day = 0; day <= totalDays; day++) {
      const dt = new Date(t0.getTime() + day * 86400000);
      if (dt.getMonth() !== prevM) {
        headerHTML += `<div class="tl-month" style="left:${LLABEL + day*DAY}px">${MON[dt.getMonth()]} ${dt.getFullYear()}</div>`;
        prevM = dt.getMonth();
      }
      if (day % 7 === 0) {
        ticksHTML += `<div class="tl-wk-line" style="left:${LLABEL + day*DAY}px;top:${HDR}px;height:${totalH - HDR}px"></div>`;
      }
    }

    const blocksHTML = placed.map((trip, idx) => {
      const bg = _tlPriceColor(trip.price, minP, maxP);
      return `<div class="tl-block"
        style="left:${trip.x}px;top:${trip.y}px;width:${trip.w}px;height:${BH}px;background:${bg}"
        onmouseenter="tlHover(event,${idx})"
        onmousemove="tlHoverMove(event)"
        onmouseleave="tlHoverOut()"
        onclick="tlClick(${idx})">
        <div class="tl-block-price">€${trip.price}</div>
        <div class="tl-block-orig">${trip.origin}</div>
      </div>`;
    }).join("");

    _tlTrips = placed;

    return `
      <div class="tl-wrap">
        <div class="tl-scroll">
          <div class="tl-inner" style="width:${W}px;height:${totalH}px">
            ${ticksHTML}${headerHTML}${linesHTML}${sectionsHTML}${blocksHTML}
          </div>
        </div>
        <div class="tl-legend">
          <div class="tl-legend-bar"></div>
          <span>cheap → expensive</span>
          <span style="margin-left:1rem;opacity:0.55">top 4 cheapest per month per airport · block width = stay duration · click for details</span>
        </div>
        <div id="tl-detail-panel"></div>
      </div>`;
  }

  async function scanDeals() {
    const btn = document.getElementById("scanBtn");
    btn.disabled = true;
    btn.textContent = "⏳ scanning…";
    document.getElementById("deals-results").innerHTML =
      `<div style="text-align:center;padding:1.5rem;color:#888;font-size:0.85rem">Fetching ~90 days of flight prices — this takes 30–60 s…</div>`;
    try {
      const origins = document.getElementById("origins").value || "AMS,EIN,BRU,NRN";
      const dests   = document.getElementById("destinations").value || "OPO,SCQ,VGO";
      const res  = await fetch(`/scan_timeline?origins=${encodeURIComponent(origins)}&destinations=${encodeURIComponent(dests)}`);
      const data = await res.json();
      const trips = data.trips || [];
      if (!trips.length) {
        document.getElementById("deals-results").innerHTML = `<div class="error-card">No trips found. Try different airports or dates.</div>`;
      } else {
        document.getElementById("deals-results").innerHTML = _renderTimeline(trips, data.start_date, data.end_date);
      }
    } catch(e) {
      document.getElementById("deals-results").innerHTML = `<div class="error-card">⚠ ${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "📅 Stay blocks — next 90 days";
    }
  }

  function clearSelection() {
    document.querySelectorAll(".flight-card.selected").forEach(c => {
      c.classList.remove("selected");
      c.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
    });
    updateShareBar();
  }

  function updateShareBar() {
    const n   = document.querySelectorAll(".flight-card.selected").length;
    const bar = document.getElementById("share-bar");
    document.getElementById("share-count").textContent = `${n} flight${n !== 1 ? "s" : ""} selected`;
    bar.classList.toggle("visible", n > 0);
  }

  function formatCard(d) {
    const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const fmt = s => { if (!s) return ""; const [y,m,dd] = s.split("-"); return `${dd} ${M[+m-1]}`; };
    let txt = `✈️ ${d.origin} → ${d.destination}\n`;
    txt += `📅 ${fmt(d.depart_date)}${d.return_date ? " → " + fmt(d.return_date) : ""}\n`;
    if (d.dep_time) txt += `🛫 Outbound: ${d.dep_time}${d.arr_time ? " → " + d.arr_time : ""}\n`;
    if (d.ret_dep_time) txt += `🛬 Return:   ${d.ret_dep_time}${d.ret_arr_time ? " → " + d.ret_arr_time : ""}\n`;
    txt += `💶 € ${d.price}   |   ${d.airline}\n`;
    txt += `🔗 ${d.booking_url}`;
    return txt;
  }

  function getSelectedData() {
    return [...document.querySelectorAll(".flight-card.selected")]
      .map(c => { try { return JSON.parse(decodeURIComponent(c.dataset.card)); } catch { return null; } })
      .filter(Boolean);
  }

  async function shareSelected(method) {
    // On My Trips tab, Gmail shares confirmed bookings; otherwise use selected cards
    const activeTab = document.querySelector(".tab-btn.active")?.id;
    const isTripsTab = activeTab === "tab-trips";
    const cards = isTripsTab ? getTrips() : getSelectedData();
    if (!cards.length) {
      showToast(isTripsTab ? "No confirmed trips to share." : "Select a card first using the Share button.");
      return;
    }

    // ── Copy: render card as image and copy to clipboard ─────────
    if (method === "copy") {
      const cardNodes = [...document.querySelectorAll(".flight-card.selected")];
      if (!cardNodes.length) return;
      const copyBtn = document.getElementById("copy-btn");
      if (copyBtn) { copyBtn.textContent = "⏳ Rendering…"; copyBtn.disabled = true; }
      try {
        const container = document.createElement("div");
        container.style.cssText = "position:fixed;left:-9999px;top:0;background:#f2e9d9;padding:16px;width:680px;border-radius:12px;";
        cardNodes.forEach(node => {
          const clone = node.cloneNode(true);
          clone.classList.remove("selected");
          clone.querySelectorAll("input[type=checkbox]").forEach(cb => cb.remove());
          clone.querySelectorAll(".row-check").forEach(el => el.remove());
          clone.style.marginBottom = "12px";
          container.appendChild(clone);
        });
        document.body.appendChild(container);
        const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: "#f2e9d9", logging: false });
        document.body.removeChild(container);
        canvas.toBlob(async (blob) => {
          // Try server-side clipboard copy first (works in PyWebView / desktop app)
          let copied = false;
          try {
            const b64 = canvas.toDataURL("image/png");
            const res = await fetch("/copy_image", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ image: b64 }),
            });
            const result = await res.json();
            if (result.ok) { copied = true; }
          } catch(e) { /* fall through to browser API */ }

          if (!copied) {
            // Browser clipboard API fallback
            try {
              await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
              copied = true;
            } catch(e) { /* fall through to download */ }
          }

          if (copied) {
            showToast("📋 Image copied — paste anywhere with Cmd+V!");
          } else {
            downloadPng(canvas);
            showToast("📥 Image downloaded — attach it manually.");
          }
          if (copyBtn) { copyBtn.textContent = "📋 Copy image"; copyBtn.disabled = false; }
        }, "image/png");
      } catch(e) {
        alert("Screenshot failed: " + e.message);
        if (copyBtn) { copyBtn.textContent = "📋 Copy"; copyBtn.disabled = false; }
      }
      return;
    }

    // ── Gmail: build styled HTML card, copy to clipboard, open Gmail compose ──
    if (method === "email") {
      const gmailBtn = document.getElementById("gmail-btn");
      if (gmailBtn) { gmailBtn.textContent = "⏳ Preparing…"; gmailBtn.disabled = true; }

      const M    = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const fmtD = s => { if (!s) return ""; const [y,m,d] = s.split("-"); return `${+d} ${M[+m-1]} ${y}`; };
      const tr   = (lbl, val) => val ? `
        <tr>
          <td style="padding:3px 14px 3px 0;font-size:13px;color:#888;white-space:nowrap;">${lbl}</td>
          <td style="padding:3px 0;font-size:13px;color:#1a1a2e;font-weight:600;">${val}</td>
        </tr>` : "";

      // Resolve airline logo URL same way as app
      const iataForEmail = name => {
        const lower = (name||"").toLowerCase();
        for (const [k,v] of Object.entries(AIRLINE_IATA)) { if (lower.includes(k)) return v; }
        return null;
      };
      const logoCell = name => {
        const code = iataForEmail(name);
        const img  = code
          ? `<img src="https://www.gstatic.com/flights/airline_logos/70px/${code}.png" width="44" height="44" style="border-radius:50%;object-fit:cover;display:block;" />`
          : `<div style="width:44px;height:44px;border-radius:50%;background:#f7f4e8;border:1.5px solid #d4c878;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#7a6800;">${name.split(" ").map(w=>w[0]||"").join("").slice(0,3).toUpperCase()}</div>`;
        return `<td style="padding-right:12px;vertical-align:middle;">${img}</td>`;
      };

      const flightRow = (depT, arrT, from, to, airline, direct, duration, date) => `
        <tr>
          ${logoCell(airline)}
          <td style="vertical-align:middle;">
            <div style="font-size:15px;font-weight:700;color:#1a1a2e;">${depT&&arrT?`${depT} – ${arrT}`:depT||"—"} <span style="font-size:11px;color:#aaa;font-weight:400;margin-left:6px;">${date?formatDateSmall(date):""}</span></div>
            <div style="font-size:12px;color:#888;margin-top:2px;">${from} – ${to}</div>
          </td>
          <td style="vertical-align:middle;padding-left:14px;font-size:11px;color:${direct?"#22a645":"#e8430a"};font-weight:600;white-space:nowrap;">${direct?"direct":"stop"}</td>
          <td style="vertical-align:middle;padding-left:14px;font-size:12px;color:#888;white-space:nowrap;">${duration||""}</td>
        </tr>`;

      const cardBlocks = cards.map(card => {
        const origin  = card.dep_airport  || card.origin      || "";
        const dest    = card.arr_airport  || card.destination || "";
        const airline = card.airline || "";
        const direct  = (card.stops === 0) || !card.stops;

        const outRow = flightRow(card.dep_time, card.arr_time, origin, dest, airline, direct, card.duration, card.depart_date);
        const retRow = card.ret_dep_time
          ? flightRow(card.ret_dep_time, card.ret_arr_time, dest, origin, airline, direct, card.duration, card.return_date)
          : "";

        // Travel schedule rows from already-rendered DOM
        const safeKey = (card.key || `${origin}-${dest}-${card.depart_date}`).replace(/[^a-zA-Z0-9]/g,"_");
        const tgEl    = document.getElementById(`mytrip-tg-${safeKey}`);
        const tgRows  = [];
        tgEl?.querySelectorAll(".tg-row").forEach(r => {
          const lbl = r.querySelector(".tg-label")?.textContent?.trim() || "";
          const val = r.querySelector(".tg-value")?.textContent?.trim() || "";
          if (lbl && val) tgRows.push([lbl, val]);
        });
        const scheduleBlock = tgRows.length ? `
          <tr><td colspan="5" style="padding:10px 16px;background:#f7f5ea;border-top:1px solid #e8e2b8;">
            <div style="font-size:10px;font-weight:700;color:#4f4300;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px;">🗓 Travel schedule</div>
            <table cellpadding="0" cellspacing="0">${tgRows.map(([l,v]) => tr(l,v)).join("")}</table>
          </td></tr>` : "";

        return `
        <table cellpadding="0" cellspacing="0"
               style="max-width:560px;width:100%;border:1.5px solid #d4c878;border-radius:12px;overflow:hidden;margin-bottom:20px;font-family:Arial,Helvetica,sans-serif;">
          <!-- Topbar -->
          <tr style="background:#fff;border-bottom:1px solid #ebebeb;">
            <td colspan="5" style="padding:8px 16px;font-size:11px;color:#888;">${airline}</td>
          </tr>
          <!-- Flight rows + price col -->
          <tr>
            <td colspan="4" style="padding:12px 16px;background:#fff;border-right:1px solid #f0f0f0;">
              <table cellpadding="4" cellspacing="0" width="100%">
                ${outRow}${retRow}
              </table>
            </td>
            <td style="padding:12px 20px;background:#f7f5ea;text-align:center;vertical-align:middle;white-space:nowrap;">
              <div style="font-size:22px;font-weight:800;color:#1a1a2e;">€ ${card.price??""}</div>
              <div style="font-size:11px;color:#aaa;margin-bottom:8px;">Basic</div>
              <a href="${card.booking_url||"#"}"
                 style="display:inline-block;background:#4f4300;color:#fff;padding:7px 16px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;">Book →</a>
            </td>
          </tr>
          ${scheduleBlock}
          <!-- Footer -->
          <tr style="background:#fafaf5;border-top:1px solid #f0ede0;">
            <td colspan="5" style="padding:6px 16px;font-size:11px;color:#bbb;">${airline} · ${fmtD(card.depart_date)}${card.return_date?" → "+fmtD(card.return_date):""}</td>
          </tr>
        </table>`;
      }).join("");

      const html = `<!DOCTYPE html><html><body style="margin:0;padding:24px;background:#f2e9d9;font-family:Arial,Helvetica,sans-serif;">
        <p style="font-size:14px;color:#555;margin:0 0 16px;">Hi,<br><br>Check out this flight:</p>
        ${cardBlocks}
        <p style="font-size:12px;color:#aaa;margin-top:8px;">Sent via UDRA Flight Planner</p>
      </body></html>`;

      // Copy HTML, open Gmail compose, auto-paste via osascript
      let ok = false;
      try {
        const r = await fetch("/share_email", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ html }),
        });
        ok = (await r.json()).ok;
      } catch(e) {}

      showToast(ok
        ? "✉️ Opening Gmail… card will be pasted automatically"
        : "✉️ Gmail opened — press Cmd+V to paste the card");

      if (gmailBtn) { gmailBtn.textContent = "✉️ Gmail"; gmailBtn.disabled = false; }
      return;
    }
  }

  function buildEmailHtml(enriched) {
    const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const fmtDate = s => { if (!s) return ""; const [y,m,d] = s.split("-"); return `${d} ${M[+m-1]} ${y}`; };
    const row = (label, value) => value ? `
      <tr>
        <td style="padding:5px 12px 5px 0;color:#666;font-size:14px;white-space:nowrap;">${label}</td>
        <td style="padding:5px 0;font-weight:700;font-size:14px;color:#1a1a2e;">${value}</td>
      </tr>` : "";

    const cards = enriched.map(({ card: c, tg }) => {
      const outboundRows = tg?.outbound ? [
        row("🏠 Leave home",              tg.outbound.leave),
        row("🚗 Arrive " + (tg.outbound.dep_airport_name||c.origin), tg.outbound.arrive_airport),
        row("🛫 Departure",               tg.outbound.departure),
        row("🛬 Arrive " + (tg.outbound.arr_airport_name||c.destination), c.arr_time || ""),
      ].join("") : [
        row("🛫 Departure", c.dep_time),
        row("🛬 Arrival",   c.arr_time),
      ].join("");

      const returnRows = tg?.return ? [
        row("🏠 Leave Spain",             tg.return.leave),
        row("🚗 Arrive " + (tg.return.dep_airport_name||c.destination), tg.return.arrive_airport),
        row("🛫 Departure",               tg.return.departure),
        row("🛬 Arrive " + (tg.return.arr_airport_name||c.origin), c.ret_arr_time || ""),
      ].join("") : (c.ret_dep_time ? [
        row("🛫 Departure", c.ret_dep_time),
        row("🛬 Arrival",   c.ret_arr_time),
      ].join("") : "");

      return `
      <div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;margin-bottom:20px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <!-- Header -->
        <div style="background:#4f4300;padding:16px 20px;">
          <div style="font-size:20px;font-weight:800;color:#fff;">✈ ${c.origin} → ${c.destination}</div>
          <div style="font-size:13px;color:#c8b870;margin-top:4px;">
            ${fmtDate(c.depart_date)}${c.return_date ? " → " + fmtDate(c.return_date) : ""} &nbsp;·&nbsp; ${c.airline} &nbsp;·&nbsp; € ${c.price}
          </div>
        </div>
        <!-- Travel guide -->
        <div style="padding:16px 20px;">
          <table style="width:100%;border-collapse:collapse;">
            <tr>
              <td style="width:50%;vertical-align:top;padding-right:16px;border-right:1px solid #eee;">
                <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#4f4300;padding-bottom:8px;margin-bottom:8px;border-bottom:2px solid #e0e0e0;">
                  ✈ Leave · ${fmtDate(c.depart_date)}
                </div>
                <table style="width:100%;border-collapse:collapse;">${outboundRows}</table>
              </td>
              <td style="width:50%;vertical-align:top;padding-left:16px;">
                ${returnRows ? `
                <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#4f4300;padding-bottom:8px;margin-bottom:8px;border-bottom:2px solid #e0e0e0;">
                  ✈ Return · ${fmtDate(c.return_date)}
                </div>
                <table style="width:100%;border-collapse:collapse;">${returnRows}</table>` : ""}
              </td>
            </tr>
          </table>
          <div style="margin-top:14px;text-align:right;">
            <a href="${c.booking_url||'#'}" style="background:#f75b28;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">Book</a>
          </div>
        </div>
      </div>`;
    }).join("");

    return `<!DOCTYPE html><html><body style="background:#f2e9d9;padding:24px;margin:0;">
      <div style="max-width:640px;margin:0 auto;">
        <div style="background:#4f4300;border-radius:8px 8px 0 0;padding:12px 20px;margin-bottom:4px;">
          <span style="font-size:18px;font-weight:800;color:#fff;letter-spacing:0.15em;">UDRA △ STUDIO ◇</span>
          <span style="color:#c8b870;font-size:13px;margin-left:12px;">travel planner</span>
        </div>
        ${cards}
        <div style="text-align:center;color:#aaa;font-size:12px;margin-top:8px;">Sent via UDRA travel planner</div>
      </div>
    </body></html>`;
  }

  function showToast(msg) {
    let t = document.getElementById("toast");
    if (!t) {
      t = document.createElement("div");
      t.id = "toast";
      t.style.cssText = "position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:0.75rem 1.4rem;border-radius:50px;font-size:0.9rem;font-weight:600;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.3);pointer-events:none;transition:opacity 0.4s;";
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = "1";
    clearTimeout(t._hide);
    t._hide = setTimeout(() => t.style.opacity = "0", 3500);
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371, toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function nearbyAirports(iata, radiusKm = 200) {
    const base = AP_LIST.find(a => a.iata === iata);
    if (!base || base.lat == null) return [];
    return AP_LIST
      .filter(a => a.iata !== iata && a.lat != null)
      .map(a => ({ ...a, distKm: Math.round(haversineKm(base.lat, base.lon, a.lat, a.lon)) }))
      .filter(a => a.distKm <= radiusKm)
      .sort((a, b) => a.distKm - b.distKm)
      .slice(0, 5);
  }

  function switchFromTab(tab) {
    _fromTab = tab;
    document.getElementById("from-tab-nl")  .classList.toggle("active", tab === "nl");

    } else {

  function toggleNearbyChip(chip) {
    chip.classList.toggle("picked");

  function addNearbyAndSearch(btn) {
    // Collect all picked chips in nearby cards
    document.querySelectorAll(".nearby-chip.picked").forEach(chip => {
      const side = chip.dataset.side;   // "from" or "to"
      const iata = chip.dataset.iata;
      if (!apState[side].selected.includes(iata)) {
        apState[side].selected.push(iata);
      }
    });
    apRenderChips("from");
    apRenderChips("to");
    apUpdateHidden("from");
    apUpdateHidden("to");
    doSearch();
  }

  function apInit() {
    ["from","to"].forEach(side => {
      apRenderChips(side);
      apUpdateHidden(side);
      apRenderList(side, "");
    });
    document.addEventListener("click", e => {
      if (!e.target.closest("#ap-from-wrap")) apClose("from");
      if (!e.target.closest("#ap-to-wrap"))   apClose("to");
    });
  }

  function apRenderChips(side) {
    const box = document.getElementById(`ap-${side}-box`);
    box.querySelectorAll(".ap-chip").forEach(c => c.remove());
    const ph = document.getElementById(`ap-${side}-ph`);
    if (apState[side].selected.length === 0) {
      ph.style.display = "";
    } else {
      ph.style.display = "none";
      apState[side].selected.forEach(iata => {
        const ap   = AP_LIST.find(a => a.iata === iata);
        const chip = document.createElement("span");
        chip.className = "ap-chip";
        chip.innerHTML = `${ap ? ap.flag : ""} ${iata} <button class="ap-chip-remove" onclick="apRemove('${side}','${iata}',event)">×</button>`;
        box.appendChild(chip);
      });
    }
  }

  function apUpdateHidden(side) {
    document.getElementById(side === "from" ? "origins" : "destinations")
      .value = apState[side].selected.join(",");
  }

  function apFocus(side) {
    document.getElementById(`ap-${side}-box`).classList.add("focused");
    document.getElementById(`ap-${side}-drop`).classList.add("open");
    const inp = document.getElementById(`ap-${side}-search`);
    inp.value = "";
    apRenderList(side, "");
    setTimeout(() => inp.focus(), 0);
  }

  function apClose(side) {
    document.getElementById(`ap-${side}-box`).classList.remove("focused");
    document.getElementById(`ap-${side}-drop`).classList.remove("open");
    document.getElementById(`ap-${side}-search`).value = "";
    apState[side].activeIdx = -1;
  }

  function apFilter(side) {
    const q = document.getElementById(`ap-${side}-search`).value;
    apRenderList(side, q);
  }

  function _apOptHtml(side, a) {
    const sel = apState[side].selected.includes(a.iata);
    return `<div class="ap-option${sel ? " selected" : ""}" data-iata="${a.iata}" onclick="apSelect('${side}','${a.iata}')">
      <span class="ap-flag">${a.flag}</span>
      <span class="ap-iata">${a.iata}</span>
      <span class="ap-info">
        <div class="ap-city">${a.city}</div>
        <div class="ap-name">${a.name} · ${a.country}</div>
      </span>
      <span class="ap-check">${sel ? "✓" : ""}</span>
    </div>`;
  }

  function apRenderList(side, query) {
    const list = document.getElementById(`ap-${side}-list`);
    const q    = query.trim().toLowerCase();

    // When "To" is open, no search typed, and exactly one origin selected → show direct flights first
    if (side === "to" && !q && apState.from.selected.length === 1) {
      const origin    = apState.from.selected[0];
      const directSet = new Set(DIRECT_TO[origin] || []);
      if (directSet.size > 0) {
        const direct  = AP_LIST.filter(a => directSet.has(a.iata));
        const others  = AP_LIST.filter(a => !directSet.has(a.iata));
        list.innerHTML =
          `<div class="ap-section-label">✈ Direct from ${origin}</div>` +
          direct.map(a => _apOptHtml(side, a)).join("") +
          `<div class="ap-section-label dim">All destinations</div>` +
          others.map(a => _apOptHtml(side, a)).join("");
        apState[side].activeIdx = -1;
        return;
      }
    }

    const matches = q
      ? AP_LIST.filter(a =>
          a.iata.toLowerCase().includes(q) ||
          a.city.toLowerCase().includes(q) ||
          a.name.toLowerCase().includes(q) ||
          a.country.toLowerCase().includes(q))
      : AP_LIST;

    if (!matches.length) {
      list.innerHTML = `<div class="ap-no-results">No airports found for "${query}"</div>`;
      return;
    }
    list.innerHTML = matches.map(a => _apOptHtml(side, a)).join("");
    apState[side].activeIdx = -1;
  }

  function apSelect(side, iata) {
    const sel = apState[side].selected;
    const idx = sel.indexOf(iata);
    if (idx === -1) sel.push(iata); else sel.splice(idx, 1);
    apRenderChips(side);
    apUpdateHidden(side);
    const q = document.getElementById(`ap-${side}-search`).value;
    apRenderList(side, q);
    // If "from" changed, refresh the "to" list so direct flights section updates
    if (side === "from") apRenderList("to", document.getElementById("ap-to-search").value);
    document.getElementById(`ap-${side}-search`).focus();
  }

  function apRemove(side, iata, event) {
    event.stopPropagation();
    const sel = apState[side].selected;
    const idx = sel.indexOf(iata);
    if (idx !== -1) sel.splice(idx, 1);
    apRenderChips(side);
    apUpdateHidden(side);
  }

  function apKey(event, side) {
    const list    = document.getElementById(`ap-${side}-list`);
    const options = list.querySelectorAll(".ap-option");
    if (!options.length) return;
    if (event.key === "ArrowDown") {
      event.preventDefault();
      apState[side].activeIdx = Math.min(apState[side].activeIdx + 1, options.length - 1);
    } else if (event.key === "ArrowUp") {
      event.preventDefault();
      apState[side].activeIdx = Math.max(apState[side].activeIdx - 1, 0);
    } else if (event.key === "Enter" && apState[side].activeIdx >= 0) {
      event.preventDefault();
      apSelect(side, options[apState[side].activeIdx].dataset.iata);
      return;
    } else if (event.key === "Escape") {
      apClose(side); return;
    } else { return; }
    options.forEach((o, i) => o.classList.toggle("active", i === apState[side].activeIdx));
    options[apState[side].activeIdx]?.scrollIntoView({ block: "nearest" });
  }

  // ── My Trips / Booking confirmation ──────────────────────────

  function getTrips() {
    try { return JSON.parse(localStorage.getItem("udra_trips") || "[]"); }
    catch(e) { return []; }
  }

  function saveTrips(trips) {
    localStorage.setItem("udra_trips", JSON.stringify(trips));
  }

  function isFlightBooked(key) {
    return getTrips().some(t => t.key === key);
  }

  function confirmFlight(event, cardEl) {
    // <a> still opens the booking URL in new tab; we just also save locally
    const data = JSON.parse(decodeURIComponent(cardEl.dataset.card));
    const key  = `${data.origin}-${data.destination}-${data.depart_date}`;
    if (isFlightBooked(key)) return;
    const trips = getTrips();
    trips.push({ ...data, key, confirmedAt: Date.now() });
    saveTrips(trips);
    updateTripsCount();
    // Flip just this card in-place: badge + Unconfirm → topbar, Book → "Book again"
    const center = cardEl.querySelector(".topbar-center");
    if (center) {
      const ub = document.createElement("button");
      ub.className   = "unconfirm-btn";
      ub.textContent = "✗ Unconfirm";
      ub.onclick     = () => unconfirmFlight(key);
      center.innerHTML = `<span class="badge badge-booked">✓ Booked</span>`;
      center.appendChild(ub);
    }
    const bookLink = cardEl.querySelector(".bekijk-deal-btn");
    if (bookLink) bookLink.textContent = "Book again";

    // Switch to My Trips and highlight the newly booked card
    showTab('trips');
    setTimeout(() => {
      const el = document.querySelector(`.mytrip-card[data-trip-key="${key.replace(/"/g,'\\"')}"]`);
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "start" });
        el.style.outline = "2.5px solid #f75b28";
        setTimeout(() => el.style.outline = "", 2000);
      }
    }, 250);
  }

  function unconfirmFlight(key) {
    const trips = getTrips().filter(t => t.key !== key);
    saveTrips(trips);
    updateTripsCount();
    // Remove the card from My Trips
    renderMyTrips();
    // Flip matching card in search results back to Book if still visible
    document.querySelectorAll(".flight-card").forEach(cardEl => {
      try {
        const d = JSON.parse(decodeURIComponent(cardEl.dataset.card || "{}"));
        const k = `${d.origin}-${d.destination}-${d.depart_date}`;
        if (k !== key) return;
        const center = cardEl.querySelector(".topbar-center");
        if (center) center.innerHTML = ""; // clear Booked badge + Unconfirm
        const bookLink = cardEl.querySelector(".bekijk-deal-btn");
        if (bookLink) bookLink.textContent = "Book";
      } catch(e) {}
    });
  }

  function updateTripsCount() { updateTabCounts(); } // alias kept for compatibility
  function updateTabCounts() {
    const nt = getTrips().length;
    const nf = getFavs().length;
    const tb = document.getElementById("trips-count");
    const fb = document.getElementById("favs-count");
    if (tb) { tb.textContent = nt; tb.style.display = nt > 0 ? "" : "none"; }
    if (fb) { fb.textContent = nf; fb.style.display = nf > 0 ? "" : "none"; }

  function showTab(tab) {
    document.getElementById("results").style.display = tab === "search" ? "block" : "none";
    document.getElementById("favs").style.display    = tab === "favs"   ? "block" : "none";
    document.getElementById("mytrips").style.display = tab === "trips"  ? "block" : "none";
    ["tab-search","tab-favs","tab-trips"].forEach(id => {
      document.getElementById(id).classList.toggle("active", id === "tab-" + tab);

  function toggleFavorite(heartBtn, key) {
    const favs = getFavs();

    const pc   = (document.getElementById(`tg-pc-${safeKey}`)?.value || "").trim();

  async function loadMyTripTG(trip, tgId, postalCode = "", city = "") {
    const el = document.getElementById(tgId);
    if (!el) return;

    const isNL      = _fromTab === "nl";
    const usePC     = postalCode || (isNL ? NL_HOME_PC   : "");
    const useCity   = city       || (isNL ? NL_HOME_CITY : "");
    const homeAddress = [usePC, useCity].filter(Boolean).join(" ");
    const safeKey   = trip.key.replace(/[^a-zA-Z0-9]/g, "_");
    const isDefault = isNL && !postalCode && !city; // using hardcoded defaults

    try {
      const p = new URLSearchParams({
        dep_airport:  trip.dep_airport || trip.origin,
        dep_time:     trip.dep_time    || "",
        dep_date:     trip.depart_date || "",
        arr_airport:  trip.arr_airport || trip.destination,
        ret_dep_time: trip.ret_dep_time || "",
        ret_dep_date: trip.return_date  || "",
      });
      if (usePC)   p.set("home_pc",   usePC);
      if (useCity) p.set("home_city", useCity);
      const res  = await fetch(`/travel_guide?${p}`);
      const data = await res.json();
      const fmtDate = s => { if (!s) return ""; const [y,m,d] = s.split("-"); const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return `${+d} ${M[+m-1]}`; };
      const row  = (label, value) => value
        ? `<div class="tg-row"><span class="tg-label">${label}</span><span class="tg-value">${value}</span></div>`
        : "";
      let leftCol = "", rightCol = "";
      if (data.outbound) {
        const o = data.outbound;
        let driveRow = "";
        let mapsRow = "";
        if (o.geocode_error) {
          driveRow = `<div class="tg-row" style="color:#c00">⚠️ Address not found — check postcode &amp; city</div>`;
        } else if (o.drive_mins) {
          const driveH = Math.floor(o.drive_mins / 60);
          const driveM = o.drive_mins % 60;
          const driveLabel = driveH > 0 ? `${driveH}h ${driveM}min` : `${driveM} min`;
          driveRow = `
            ${o.leave          ? row("🏠 Leave home",                    o.leave)          : ""}
            ${row("🚗 Drive to " + o.dep_airport_name,                   driveLabel)}
            ${o.arrive_airport ? row("✅ Arrive " + o.dep_airport_name,  o.arrive_airport) : ""}`;
          if (o.home_label) {
            const orig = encodeURIComponent(o.home_label);
            const dest = encodeURIComponent(o.dep_airport_name + " airport");
            mapsRow = `<div class="tg-maps-row">
              <a href="https://www.google.com/maps/dir/?api=1&origin=${orig}&destination=${dest}&travelmode=driving" target="_blank" rel="noopener" class="tg-map-link">🗺 Car directions</a>
              <a href="https://www.google.com/maps/dir/?api=1&origin=${orig}&destination=${dest}&travelmode=transit" target="_blank" rel="noopener" class="tg-map-link">🚂 Train / transit</a>
            </div>`;
          }
        }
        leftCol = `
          <div class="tg-col-title">✈ Leave &nbsp;·&nbsp; ${fmtDate(o.date || trip.depart_date)}</div>
          ${driveRow}
          ${mapsRow}
          ${o.departure   ? row("🛫 Departure",                  o.departure)       : ""}
          ${trip.arr_time ? row("🛬 Arrive " + o.arr_airport_name, trip.arr_time)  : ""}`;
      } else {
        leftCol = `
          <div class="tg-col-title">✈ Leave &nbsp;·&nbsp; ${fmtDate(trip.depart_date)}</div>`;
      }
      if (data.return) {
        const r = data.return;
        const tzTag = r.tz ? ` <span style="opacity:0.5;font-size:0.82em">${r.tz}</span>` : "";
        let retDriveRow = "";
        if (r.drive_mins) {
          const driveH = Math.floor(r.drive_mins / 60);
          const driveM = r.drive_mins % 60;
          const driveLabel = driveH > 0 ? `${driveH}h ${driveM}min` : `${driveM} min`;
          retDriveRow = `
            ${r.leave          ? row("🏠 Leave Bueu",                          r.leave + tzTag)          : ""}
            ${row("🚗 Drive to " + r.dep_airport_name,                         driveLabel)}
            ${r.arrive_airport ? row("✅ Arrive " + r.dep_airport_name,        r.arrive_airport + tzTag) : ""}`;
        }
        rightCol = `
          <div class="tg-col-title">✈ Return &nbsp;·&nbsp; ${fmtDate(r.date)}</div>
          ${retDriveRow}
          ${row("🛫 Departure", r.departure + tzTag)}
          ${trip.ret_arr_time ? row("🛬 Arrive " + r.arr_airport_name, trip.ret_arr_time) : ""}`;
      }
      const calData = JSON.stringify({
        dep: trip.depart_date, ret: trip.return_date,
        origin: trip.origin, dest: trip.destination,
        deptime: trip.dep_time, arrtime: trip.arr_time,
        retdep: trip.ret_dep_time, retarr: trip.ret_arr_time,
        price: "", airline: "",
      });
      // Address section
      const addrSection = isNL
        ? `<div class="tg-addr-wrap">
            <div class="tg-addr-display" id="tg-addr-display-${safeKey}">
              📍 ${usePC} ${useCity}
              <button class="tg-addr-edit-btn" onclick="showTGAddrEdit('${safeKey}')">✏️ change</button>
            </div>
            <div class="tg-addr-form" id="tg-addr-form-${safeKey}" style="display:none">
              <input class="tg-addr-input pc"   id="tg-pc-${safeKey}"   type="text" value="${usePC}"   placeholder="Postcode" />
              <input class="tg-addr-input city" id="tg-city-${safeKey}" type="text" value="${useCity}" placeholder="City" />
              <button class="tg-addr-btn" onclick="reloadMyTripTG('${safeKey}','${trip.key}')">Update</button>
            </div>
           </div>`
        : `<div class="tg-addr-wrap">
            <div class="tg-addr-form" id="tg-addr-form-${safeKey}" style="display:flex">
              <input class="tg-addr-input pc"   id="tg-pc-${safeKey}"   type="text" value="${usePC}"   placeholder="Postcode" />
              <input class="tg-addr-input city" id="tg-city-${safeKey}" type="text" value="${useCity}" placeholder="City" />
              <button class="tg-addr-btn" onclick="reloadMyTripTG('${safeKey}','${trip.key}')">Calculate</button>
            </div>
           </div>`;

      el.innerHTML = `
        <div class="tg-cols">
          <div>${leftCol}${addrSection}</div>
          <div>${rightCol}</div>
        </div>
        <div class="tg-footer">
          <button class="tg-cal-btn" onclick="openCalendarFromPanel(this)" data-tg='${encodeURIComponent(calData)}'>📅 Add to calendar</button>
        </div>`;
    } catch(e) {
      el.innerHTML = `<div class="mytrip-tg-loading">Travel guide unavailable</div>`;
    }
  }

  // ── Momondo-style Calendar ─────────────────────────────────────────
  const CAL_M  = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  const CAL_D  = ['m','d','w','d','v','z','z'];
  const _cal   = { tab:'dates', step:'dep', depDate:null, retDate:null, hover:null, year0:0, month0:0, oneway:false };

  function calInit() {
    const today = new Date(); today.setHours(0,0,0,0);
    _cal.year0  = today.getFullYear();
    _cal.month0 = today.getMonth();
    _calUpdateHidden();
    _calUpdateTrigger();
    document.addEventListener('click', e => {
      const path    = e.composedPath();
      const popup   = document.getElementById('cal-popup');
      const trigger = document.getElementById('cal-trigger');
      if (!path.includes(popup) && !path.includes(trigger)) calClose();
    });
  }

  function _calFmt(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function _calDisp(ds) {
    const d = new Date(ds + 'T00:00:00');
    return `${d.getDate()} ${CAL_M[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
  }
  function _calUpdateHidden() {
    document.getElementById('depart_date').value = _cal.depDate || '';
    document.getElementById('return_date').value  = _cal.oneway ? '' : (_cal.retDate || '');
  }
  function _calUpdateTrigger() {
    const dep = document.getElementById('cal-trig-dep');
    const ret = document.getElementById('cal-trig-ret');
    const sep = document.getElementById('cal-trig-sep');
    if (_cal.depDate) {
      dep.textContent = _calDisp(_cal.depDate); dep.className = '';
      if (!_cal.oneway && _cal.retDate) {
        ret.textContent = _calDisp(_cal.retDate);
        ret.style.display = sep.style.display = '';
      } else { ret.style.display = sep.style.display = 'none'; }
    } else {
      dep.textContent = 'Add departure date'; dep.className = 'cal-trigger-ph';
      ret.style.display = sep.style.display = 'none';
    }
  }

  function calToggle() {
    const p = document.getElementById('cal-popup');
    p.classList.contains('open') ? calClose() : calOpen();
  }
  function calOpen() {
    const popup = document.getElementById('cal-popup');
    const rect  = document.getElementById('cal-trigger').getBoundingClientRect();
    const w     = Math.min(640, window.innerWidth - 16);
    let   left  = rect.left;
    if (left + w > window.innerWidth - 8) left = window.innerWidth - w - 8;
    popup.style.cssText = `top:${rect.bottom + 6}px;left:${Math.max(8,left)}px;width:${w}px`;
    // If both dates already set → restart with dep step so user can change departure.
    // If only dep set → continue to ret step. If nothing set → dep step.
    _cal.step = (_cal.depDate && !_cal.retDate && !_cal.oneway) ? 'ret' : 'dep';
    _calRender();
    popup.classList.add('open');
    document.getElementById('cal-trigger').classList.add('open');
  }
  function calClose() {
    document.getElementById('cal-popup').classList.remove('open');
    document.getElementById('cal-trigger').classList.remove('open');
    _cal.hover = null;
  }
  function calSetTab(tab) { _cal.tab = tab; _calRender(); }
  function calPrev() {
    _cal.month0--; if (_cal.month0 < 0) { _cal.month0 = 11; _cal.year0--; } _calRender();
  }
  function calNext() {
    _cal.month0++; if (_cal.month0 > 11) { _cal.month0 = 0; _cal.year0++; } _calRender();
  }

  function _calRender() {
    const popup = document.getElementById('cal-popup');
    popup.querySelectorAll('.cal-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === _cal.tab));

    const mw = document.getElementById('cal-months-wrap');
    const nr = document.getElementById('cal-nav-row');
    const wv = document.getElementById('cal-weekend-view');
    const mv = document.getElementById('cal-month-view');
    mw.style.display = nr.style.display = (_cal.tab === 'dates')   ? '' : 'none';
    wv.style.display = (_cal.tab === 'weekend') ? 'flex' : 'none';
    mv.style.display = (_cal.tab === 'month')   ? 'grid' : 'none';

    // Step bar
    document.getElementById('cal-step-dep').classList.toggle('active', _cal.step === 'dep');
    document.getElementById('cal-step-ret').classList.toggle('active', _cal.step === 'ret');
    document.getElementById('cal-step-ret').style.display = _cal.oneway ? 'none' : '';
    const depDE = document.getElementById('cal-step-dep-date');
    const retDE = document.getElementById('cal-step-ret-date');
    depDE.textContent = _cal.depDate ? _calDisp(_cal.depDate) : 'Datum toevoegen';
    depDE.className   = 'cal-step-date' + (_cal.depDate ? '' : ' ph');
    retDE.textContent = _cal.retDate   ? _calDisp(_cal.retDate)  : 'Datum toevoegen';
    retDE.className   = 'cal-step-date' + (_cal.retDate ? '' : ' ph');

    // Prev button disabled if at current month
    const now = new Date();
    document.getElementById('cal-prev-btn').classList.toggle('disabled',
      _cal.year0 < now.getFullYear() || (_cal.year0 === now.getFullYear() && _cal.month0 <= now.getMonth()));

    if (_cal.tab === 'dates')   _calRenderMonths();
    if (_cal.tab === 'weekend') _calRenderWeekends();
    if (_cal.tab === 'month')   _calRenderMonthPills();
  }

  function _calRenderMonths() {
    let y1 = _cal.year0, m1 = _cal.month0;
    let y2 = y1, m2 = m1 + 1;
    if (m2 > 11) { m2 = 0; y2++; }
    document.getElementById('cal-month-0').innerHTML = _calBuildMonth(y1, m1);
    document.getElementById('cal-month-1').innerHTML = _calBuildMonth(y2, m2);
  }

  function _calBuildMonth(yr, mo) {
    const today = new Date(); today.setHours(0,0,0,0);
    const dow   = (new Date(yr, mo, 1).getDay() + 6) % 7;
    const days  = new Date(yr, mo + 1, 0).getDate();
    let rs = _cal.depDate, re = _cal.retDate;
    if (_cal.step === 'ret' && _cal.hover && _cal.depDate && _cal.hover > _cal.depDate) re = _cal.hover;

    let h = `<div class="cal-month-title">${CAL_M[mo]} ${yr}</div><div class="cal-grid">`;
    h += CAL_D.map(d => `<div class="cal-hdr">${d}</div>`).join('');
    for (let i = 0; i < dow; i++) h += '<div class="cal-day empty"></div>';

    for (let day = 1; day <= days; day++) {
      const ds  = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dt  = new Date(yr, mo, day);
      const past = dt < today;
      const cls = ['cal-day',
        past                                           ? 'past'        : '',
        dt.getTime() === today.getTime()               ? 'today'       : '',
        _cal.depDate === ds                            ? 'dep-sel'     : '',
        !_cal.oneway && _cal.retDate === ds            ? 'ret-sel'     : '',
        !_cal.oneway && rs && re && ds>rs && ds<re     ? 'in-range'    : '',
        !_cal.oneway && rs && re && ds === rs          ? 'range-start' : '',
        !_cal.oneway && rs && re && ds === re          ? 'range-end'   : '',
      ].filter(Boolean).join(' ');
      const ev = past ? '' : `onclick="calPick('${ds}')" onmouseenter="calHov('${ds}')" onmouseleave="calHovOut()"`;
      h += `<div class="${cls}" data-ds="${ds}" ${ev}><div class="cal-day-inner">${day}</div></div>`;
    }
    return h + '</div>';
  }

  function calPick(ds) {
    if (_cal.step === 'dep' || (_cal.depDate && ds <= _cal.depDate)) {
      _cal.depDate = ds; _cal.retDate = null;
      _cal.step = _cal.oneway ? 'done' : 'ret';
      if (_cal.oneway) { _calUpdateHidden(); _calUpdateTrigger(); setTimeout(calClose, 220); return; }
    } else {
      _cal.retDate = ds; _cal.step = 'done';
      _calUpdateHidden(); _calUpdateTrigger(); setTimeout(calClose, 220); return;
    }
    _calUpdateHidden(); _calUpdateTrigger(); _calRender(); _calUpdateRangeClasses();
  }
  function _calUpdateRangeClasses() {
    const rs = _cal.depDate;
    const re = (_cal.step === 'ret' && _cal.hover && _cal.depDate && _cal.hover > _cal.depDate)
               ? _cal.hover : _cal.retDate;
    document.querySelectorAll('.cal-day[data-ds]').forEach(el => {
      const ds = el.dataset.ds;
      el.classList.toggle('in-range',    !_cal.oneway && !!(rs && re && ds > rs && ds < re));
      el.classList.toggle('range-start', !_cal.oneway && !!(rs && re && ds === rs));
      el.classList.toggle('range-end',   !_cal.oneway && !!(rs && re && ds === re));
    });
  }
  function calHov(ds)  { _cal.hover = ds;   if (_cal.step === 'ret') _calUpdateRangeClasses(); }
  function calHovOut() { _cal.hover = null;  if (_cal.step === 'ret') _calUpdateRangeClasses(); }

  function _calRenderWeekends() {
    const today = new Date(); today.setHours(0,0,0,0);
    let d = new Date(today);
    while (d.getDay() !== 5) d.setDate(d.getDate() + 1);
    let h = '';
    for (let i = 0; i < 10; i++) {
      const fri = new Date(d), sun = new Date(d);
      sun.setDate(fri.getDate() + 2);
      const fs = _calFmt(fri), ss = _calFmt(sun);
      const sel = _cal.depDate === fs && _cal.retDate === ss;
      h += `<button class="cal-weekend-pill${sel?' sel':''}" onclick="calPickWeekend('${fs}','${ss}')">
        <div>${fri.getDate()}–${sun.getDate()} ${CAL_M[sun.getMonth()].slice(0,3)}</div>
        <div class="cal-wk-sub">${CAL_M[fri.getMonth()].slice(0,3)} ${fri.getFullYear()}</div>
      </button>`;
      d.setDate(d.getDate() + 7);
    }
    document.getElementById('cal-weekend-view').innerHTML = h;
  }
  function calPickWeekend(fs, ss) {
    _cal.depDate = fs; _cal.retDate = _cal.oneway ? null : ss; _cal.step = 'done';
    _calUpdateHidden(); _calUpdateTrigger(); _calRender(); setTimeout(calClose, 250);
  }

  function _calRenderMonthPills() {
    const now = new Date();
    let y = now.getFullYear(), m = now.getMonth(), h = '';
    for (let i = 0; i < 12; i++) {
      const first = `${y}-${String(m+1).padStart(2,'0')}-01`;
      const last  = _calFmt(new Date(y, m+1, 0));
      const past  = y < now.getFullYear() || (y === now.getFullYear() && m < now.getMonth());
      const sel   = _cal.depDate >= first && _cal.depDate <= last;
      h += `<button class="cal-month-pill${sel?' sel':''}${past?' past':''}" onclick="${past?'':` calPickMonth('${first}','${last}')`}">
        <div>${CAL_M[m].slice(0,3)}</div><div style="font-size:0.65rem;opacity:0.65">${y}</div>
      </button>`;
      if (++m > 11) { m = 0; y++; }
    }
    document.getElementById('cal-month-view').innerHTML = h;
  }
  function calPickMonth(first, last) {
    _cal.depDate = first; _cal.retDate = _cal.oneway ? null : last; _cal.step = 'done';
    _calUpdateHidden(); _calUpdateTrigger(); _calRender(); setTimeout(calClose, 250);
  }

  function calSetStep(step) {
    if (_cal.oneway && step === 'ret') return;
    _cal.step = step;
    _calRender();
  }
  function calSetTrip(type) {
    _cal.oneway = (type === 'oneway');
    if (_cal.oneway) _cal.retDate = null;
    _calUpdateHidden(); _calUpdateTrigger();
    if (document.getElementById('cal-popup').classList.contains('open')) _calRender();
  }
  // ── end calendar ───────────────────────────────────────────────────

  document.addEventListener("DOMContentLoaded", () => { apInit(); calInit(); updateTabCounts(); });
</script>

<div id="tl-tooltip"></div>
</body>
</html>
