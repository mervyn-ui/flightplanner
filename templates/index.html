<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flight Search</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2e9d9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #4f4300;
      padding: 2rem 1rem 3.2rem;
      text-align: center;
    }
    .udra-logo { display: block; margin: 0 auto 0.2rem; height: 60px; width: auto; }
    header p  { color: #c8b870; margin-top: 0; font-size: 0.88rem; letter-spacing: 0.04em; }

    /* ── Search card ── */
    .search-wrap {
      max-width: 900px;
      margin: -1.8rem auto 0;
      padding: 0 1rem;
    }
    .search-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.8rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.14);
      overflow: hidden;
    }

    .trip-toggle { display: flex; gap: 0.5rem; margin-bottom: 1.4rem; }
    .trip-btn {
      padding: 0.45rem 1.2rem;
      border-radius: 99px;
      border: 1.5px solid #d0d7e2;
      background: transparent;
      color: #5a6a85;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .trip-btn.active { background: #4f4300; border-color: #4f4300; color: #fff; }

    .fields      { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; align-items: end; }
    .dates-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.4rem; }
    #return-row  { display: none; }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #8a99b0;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.35rem;
    }
    .field input {
      width: 100%;
      border: 1.5px solid #d0d7e2;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
      background: #f8fafc;
    }
    .field input:focus { border-color: #4f4300; background: #fff; }

    .search-btn {
      width: 100%;
      padding: 0.95rem;
      background: #4f4300;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .search-btn:hover    { opacity: 0.88; }
    .search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── FROM region tabs ── */
    .from-tabs { display: flex; gap: 0.3rem; margin-bottom: 0.45rem; }
    .from-tab {
      padding: 0.18rem 0.75rem; font-size: 0.72rem; font-weight: 700;
      border: 1.5px solid #d0d7e2; border-radius: 20px;
      background: #f8fafc; color: #888; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .from-tab.active { background: #4f4300; color: #fff; border-color: #4f4300; }
    .from-tab:hover:not(.active) { border-color: #4f4300; color: #4f4300; }

    /* ── Tabs ── */
    .tabs-bar {
      max-width: 900px;
      margin: 1.6rem auto 0;
      padding: 0 1rem;
      display: flex;
      gap: 0.4rem;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab-btn {
      padding: 0.55rem 1.2rem;
      font-size: 0.9rem; font-weight: 600;
      border: none; background: none;
      color: #888; cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active { color: #4f4300; border-bottom-color: #4f4300; }
    .tab-btn:hover:not(.active) { color: #4f4300; }
    .tab-badge {
      display: inline-block;
      background: #f75b28; color: #fff;
      font-size: 0.65rem; font-weight: 800;
      border-radius: 99px; padding: 0.1rem 0.45rem;
      margin-left: 0.3rem; vertical-align: middle;
    }
    .tab-badge-green {
      display: inline-block;
      background: #22c55e; color: #fff;
      font-size: 0.65rem; font-weight: 800;
      border-radius: 99px; padding: 0.1rem 0.45rem;
      margin-left: 0.3rem; vertical-align: middle;
    }

    /* ── Results ── */
    .results-wrap {
      max-width: 900px;
      margin: 1.6rem auto 3rem;
      padding: 0 1rem;
    }
    .mytrips-wrap {
      max-width: 900px;
      margin: 1.6rem auto 3rem;
      padding: 0 1rem;
      display: none;
    }
    .results-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.9rem;
      font-size: 0.85rem;
      color: #5a6a85;
    }
    .results-meta strong { color: #1a1a2e; font-size: 1rem; }

    /* ── Flight card ── */
    .flight-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      margin-bottom: 0.6rem;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .flight-card.selected {
      border-color: #7a6800;
      box-shadow: 0 0 0 2px #c9a8f5;
    }

    /* Floating share bar */
    #share-bar {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      color: #fff;
      border-radius: 50px;
      padding: 0.75rem 1.25rem;
      display: none;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      z-index: 999;
      white-space: nowrap;
    }
    #share-bar.visible { display: flex; }
    .share-count { font-size: 0.9rem; font-weight: 600; margin-right: 0.25rem; }
    .share-btn {
      background: #fff; color: #1a1a2e; border: none;
      border-radius: 20px; padding: 0.4rem 0.9rem;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    .share-btn:hover { background: #e8e8ff; }
    .share-btn.wa  { background: #25d366; color: #fff; }
    .share-btn.wa:hover { background: #1ebe5b; }
    .share-clear { background: none; border: none; color: #aaa; cursor: pointer; font-size: 1.1rem; padding: 0 0.25rem; }
    .share-clear:hover { color: #fff; }

    /* Top bar: [♡ ↗]  [badges]  [luggage] */
    .card-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid #ebebeb;
      background: #fff;
    }
    .topbar-left   { display: flex; gap: 0.4rem; }
    .topbar-center { display: flex; gap: 0.4rem; }
    .topbar-right  { display: flex; gap: 0.3rem; align-items: center; }
    .bag-tag {
      display: flex; align-items: center; gap: 0.2rem;
      border: 1.5px solid #e0e0e0; border-radius: 7px;
      padding: 0.2rem 0.45rem; font-size: 0.72rem; font-weight: 600;
      background: #fff; color: #555; white-space: nowrap;
    }
    .bag-tag.included { border-color: #a8e6bc; color: #1a7a3a; background: #f0fdf4; }
    .bag-tag.paid     { border-color: #ffd0b8; color: #b84800; background: #fff8f5; }
    .bag-tag.unknown  { border-color: #e0e0e0; color: #aaa; }

    .icon-btn {
      width: 34px; height: 34px;
      border: 1.5px solid #b8a850;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: #7a6800;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: #f7f4e8; }
    .icon-btn.fav-active { color: #22c55e; border-color: #22c55e; background: #f0fdf4; }
    .share-select-btn {
      padding: 0.3rem 0.75rem;
      border: 1.5px solid #b8a850; border-radius: 6px;
      background: transparent; color: #4f4300;
      font-size: 0.78rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    .share-select-btn:hover { background: #f7f4e8; }
    .share-select-btn.selected { background: #4f4300; color: #fff; border-color: #4f4300; }
    /* Travel guide address row */

    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.28rem 0.85rem;
      border-radius: 99px;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .badge-best     { background: #d5f5f0; color: #0a8a7e; }
    .badge-cheapest { background: #d4f5dc; color: #1a8c3a; }
    .badge-booked   { background: #f75b28; color: #fff; font-weight: 800; letter-spacing: 0.04em; }

    .luggage-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border: 1.5px solid #b8a850;
      border-radius: 8px;
      padding: 0.25rem 0.6rem;
      background: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1a1a2e;
      cursor: pointer;
      min-width: 44px;
    }

    /* Card body: flight rows | price */
    .card-body { display: flex; align-items: stretch; }

    /* Flight rows stacked on the left */
    .card-flights { flex: 1; min-width: 0; }

    .flight-row {
      display: flex;
      align-items: center;
      padding: 1rem 1rem;
      border-bottom: 1px solid #f2f2f2;
      gap: 0.8rem;
    }
    .flight-row:last-child { border-bottom: none; }

    /* Checkbox */
    .row-check input[type=checkbox] {
      width: 17px; height: 17px;
      accent-color: #7a6800;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Airline logo */
    .row-logo {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid #d4c878;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 0.6rem; font-weight: 900; color: #7a6800; letter-spacing: -0.5px;
    }
    .row-logo img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* Times + city */
    .row-info { flex: 1; min-width: 0; }
    .row-times {
      font-size: 1.35rem;
      font-weight: 800;
      color: #111111;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }
    .row-date-label {
      font-size: 0.7rem;
      color: #aaa;
      font-weight: 400;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .row-cities {
      font-size: 0.8rem;
      color: #888888;
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 400;
    }

    /* Direct */
    .row-direct {
      width: 80px;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 700;
      color: #111;
      flex-shrink: 0;
    }
    .row-direct.stops { color: #d97706; font-weight: 600; }

    /* Duration */
    .row-duration {
      width: 72px;
      text-align: left;
      font-size: 0.875rem;
      font-weight: 400;
      color: #222;
      flex-shrink: 0;
    }

    /* Price — right column with left border, spans all rows */
    .card-price {
      width: 140px;
      flex-shrink: 0;
      border-left: 1px solid #ebebeb;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem 1.1rem;
      gap: 0.3rem;
    }
    .price-amount {
      font-size: 2.2rem;
      font-weight: 900;
      color: #111;
      line-height: 1;
      white-space: nowrap;
      letter-spacing: -1px;
    }
    .price-tier {
      font-size: 0.78rem;
      color: #888;
      font-weight: 400;
    }
    .bekijk-deal-btn {
      display: block;
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.7rem 0.5rem;
      background: #f75b28;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .bekijk-deal-btn:hover { opacity: 0.88; }
    .rental-card-btn {
      display: block;
      width: 100%;
      margin-top: 0.3rem;
      padding: 0.4rem 0.5rem;
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #333;
      text-decoration: none;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .rental-card-btn:hover { border-color: #e8430a; color: #e8430a; background: #fff8f5; }
    .parkos-card-btn {
      display: block;
      width: 100%;
      margin-top: 0.3rem;
      padding: 0.4rem 0.5rem;
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #333;
      text-decoration: none;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .parkos-card-btn:hover { border-color: #0070c0; color: #0070c0; background: #f0f7ff; }
    .unconfirm-btn {
      display: block; width: 100%;
      margin-top: 0.3rem; padding: 0.4rem 0.5rem;
      background: none; border: 1.5px solid #ccc;
      border-radius: 7px; font-size: 0.78rem; font-weight: 600;
      color: #999; cursor: pointer; text-align: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .unconfirm-btn:hover { border-color: #f75b28; color: #f75b28; }
.topbar-center .unconfirm-btn {
      display: inline-flex; align-items: center;
      width: auto; margin-top: 0; padding: 0.2rem 0.55rem;
    }
    /* My trips inline travel guide */
    .mytrip-tg {
      padding: 0.9rem 1.1rem;
      background: #ffffff;
      border-top: 1px solid #ddd8b0;
      font-size: 0.8rem;
    }
    .mytrip-tg-loading { color: #888; font-size: 0.82rem; }
    .mytrip-card { border-left: 4px solid #f75b28; }
    .calendar-card-btn {
      display: block;
      width: 100%;
      margin-top: 0.3rem;
      padding: 0.4rem 0.5rem;
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #333;
      text-decoration: none;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .calendar-card-btn:hover { border-color: #7a6800; color: #7a6800; background: #f7f4e8; }

    /* Travel guide */
    .travelguide-btn {
      display: block; width: 100%; margin-top: 0.3rem;
      padding: 0.4rem 0.5rem; background: #f0f4ff;
      border: 1.5px solid #b8a850; border-radius: 7px;
      font-size: 0.72rem; font-weight: 600; color: #4f4300;
      text-align: center; cursor: pointer; transition: background 0.15s;
    }
    .travelguide-btn:hover { background: #ede8c8; }
    .travelguide-panel {
      margin-top: 0.5rem; padding: 0.85rem 1rem; background: #f7f5ea;
      border: 1px solid #ddd8b0; border-radius: 8px; font-size: 0.8rem;
    }
    .tg-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1.2rem;
    }
    .tg-col-title {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4f4300;
      margin-bottom: 0.4rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid #ddd8b0;
    }
    .tg-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.18rem 0;
      border-bottom: 1px solid #eee;
    }
    .tg-row:last-of-type { border-bottom: none; }
    .tg-label { color: #666; white-space: nowrap; flex-shrink: 0; }
    .tg-value { font-weight: 700; color: #1a1a2e; text-align: right; }
    .tg-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.65rem;
      padding-top: 0.5rem;
      border-top: 1px solid #ddd8b0;
    }
    .tg-cal-btn {
      background: #4f4300; color: #fff;
      border: none; border-radius: 7px;
      padding: 0.4rem 0.9rem;
      font-size: 0.78rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .tg-cal-btn:hover { background: #6b5800; }
    /* Address section in travel guide */
    .tg-addr-wrap {
      margin-top: 0.65rem;
      padding-top: 0.5rem;
      border-top: 1px dashed #ddd8b0;
      font-size: 0.78rem;
    }
    .tg-addr-display {
      display: flex; align-items: center; gap: 0.4rem;
      color: #666;
    }
    .tg-addr-edit-btn {
      background: none; border: none; cursor: pointer;
      color: #7a6800; font-size: 0.72rem; font-weight: 700;
      padding: 0.1rem 0.3rem; border-radius: 4px;
      transition: background 0.15s;
    }
    .tg-addr-edit-btn:hover { background: #f0ead0; }
    .tg-addr-form {
      display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap;
      margin-top: 0.3rem;
    }
    .tg-addr-input {
      border: 1.5px solid #d0d7e2; border-radius: 6px;
      padding: 0.3rem 0.55rem; font-size: 0.78rem;
      background: #fff; outline: none;
      transition: border-color 0.15s;
    }
    .tg-addr-input:focus { border-color: #4f4300; }
    .tg-addr-input.pc   { width: 90px; }
    .tg-addr-input.city { width: 120px; }
    .tg-addr-btn {
      background: #4f4300; color: #fff; border: none;
      border-radius: 6px; padding: 0.3rem 0.7rem;
      font-size: 0.75rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .tg-addr-btn:hover { background: #6b5800; }
    .tg-maps { display: block; margin-top: 0.5rem; text-align: center; color: #4f4300; font-weight: 600; text-decoration: none; }
    .tg-maps:hover { text-decoration: underline; }

    /* Airline footer */
    .card-footer {
      padding: 0.4rem 1rem 0.55rem 4.5rem;
      font-size: 0.78rem;
      color: #888;
      font-weight: 400;
    }

    /* ── Nearby dates price strip ── */
    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #111;
      margin: 2rem 0 0.75rem;
    }

    .price-strip {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .strip-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
      margin-bottom: 0.75rem;
    }
    .strip-pills {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .price-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.55rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 90px;
    }
    .price-pill:hover { border-color: #7a6800; background: #f5f2e5; }
    .price-pill.selected {
      border-color: #7a6800;
      background: #f7f4e8;
    }
    .pill-date {
      font-size: 0.78rem;
      color: #555;
      font-weight: 500;
      white-space: nowrap;
    }
    .pill-price {
      font-size: 1rem;
      font-weight: 800;
      color: #111;
      margin-top: 0.2rem;
    }
    .price-pill.selected .pill-price { color: #7a6800; }

    /* ── Rental cars ── */
    /* Best deals scanner */
    .scan-link-btn {
      background: none; border: none; color: #4f4300;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      text-decoration: underline; padding: 0;
    }
    .scan-link-btn:hover { color: #6b5800; }
    .scan-link-btn:disabled { color: #aaa; cursor: not-allowed; text-decoration: none; }
    .deals-grid { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
    .deal-card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 12px;
      padding: 1.25rem; min-width: 260px; flex: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .deal-route { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
    .deal-dates { font-size: 0.85rem; color: #666; margin: 0.3rem 0; }
    .deal-price { font-size: 2rem; font-weight: 800; color: #1a1a2e; margin: 0.5rem 0; }
    .deal-airline { font-size: 0.8rem; color: #888; }
    .deal-book-btn {
      display: block; margin-top: 0.75rem; background: #e91e8c; color: #fff;
      border: none; border-radius: 8px; padding: 0.5rem 1rem;
      font-weight: 700; cursor: pointer; text-decoration: none;
      text-align: center; font-size: 0.9rem;
    }
    .rental-section { margin-top: 2rem; }
    .rental-grid { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .rental-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.1rem 1.3rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .rental-airport {
      font-size: 1rem;
      font-weight: 800;
      color: #111;
    }
    .rental-dates {
      font-size: 0.78rem;
      color: #888;
    }
    .rental-btn {
      display: inline-block;
      margin-top: 0.3rem;
      padding: 0.55rem 1rem;
      background: #e8430a;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.2s;
    }
    .rental-btn:hover { opacity: 0.85; }

    /* Loading / error */
    .loading { text-align: center; padding: 3rem; color: #8a99b0; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #e2e6ef;
      border-top-color: #4f4300;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-card {
      background: #fff5f5;
      border: 1.5px solid #fca5a5;
      border-radius: 12px;
      padding: 1rem 1.4rem;
      margin-bottom: 0.75rem;
      color: #b91c1c;
      font-size: 0.88rem;
    }
    .no-flights-card {
      background: #fff;
      border: 1.5px solid #e5e5e5;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.6rem;
    }
    .no-flights-title {
      font-size: 0.95rem; font-weight: 700; color: #555; margin-bottom: 0.4rem;
    }
    .no-flights-alts {
      font-size: 0.8rem; color: #888; margin-top: 0.3rem;
    }
    .no-flights-alts strong { color: #4f4300; }
    .nearby-section { margin-top: 0.5rem; }
    .nearby-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #999; margin-bottom: 0.35rem;
    }
    .nearby-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.4rem; }
    .nearby-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      border: 1.5px solid #d0d7e2; border-radius: 7px;
      padding: 0.25rem 0.65rem; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; background: #fff; color: #333;
      transition: all 0.15s;
    }
    .nearby-chip:hover { border-color: #4f4300; color: #4f4300; background: #f7f5ea; }
    .nearby-chip.picked { border-color: #4f4300; background: #4f4300; color: #fff; }
    .nearby-dist { font-size: 0.7rem; opacity: 0.7; }
    .nearby-retry-btn {
      margin-top: 0.65rem;
      background: #4f4300; color: #fff; border: none;
      border-radius: 8px; padding: 0.5rem 1.1rem;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    .nearby-retry-btn:hover { background: #6b5800; }
    .nearby-retry-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* ── Airport picker ── */
    .ap-wrap { position: relative; }
    .ap-box {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem;
      min-height: 46px; padding: 0.4rem 0.75rem;
      border: 1.5px solid #d0d7e2; border-radius: 10px;
      background: #f8fafc; cursor: pointer;
      transition: border-color 0.2s;
      user-select: none;
    }
    .ap-box.focused { border-color: #4f4300; background: #fff; }
    .ap-placeholder { color: #aaa; font-size: 0.95rem; }
    .ap-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: #4f4300; color: #fff;
      border-radius: 6px; padding: 0.22rem 0.55rem;
      font-size: 0.82rem; font-weight: 700; white-space: nowrap;
    }
    .ap-chip-remove {
      background: none; border: none; color: #fff;
      cursor: pointer; font-size: 1rem; line-height: 1;
      padding: 0; opacity: 0.7;
    }
    .ap-chip-remove:hover { opacity: 1; }

    .ap-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #fff; border: 1.5px solid #d0d7e2;
      border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,0.15);
      z-index: 500; display: none; overflow: hidden;
    }
    .ap-dropdown.open { display: block; }

    .ap-search-wrap {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 0.9rem;
      border-bottom: 1px solid #eee;
      background: #fff;
      position: sticky; top: 0;
    }
    .ap-search-icon { font-size: 1rem; color: #aaa; flex-shrink: 0; }
    .ap-search {
      flex: 1; border: none; outline: none;
      font-size: 0.97rem; color: #1a1a2e; background: transparent;
    }
    .ap-search::placeholder { color: #bbb; }
    .ap-list { max-height: 240px; overflow-y: auto; }

    .ap-option {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0.9rem; cursor: pointer;
      transition: background 0.1s;
    }
    .ap-option:hover, .ap-option.active { background: #f7f5ea; }
    .ap-option.selected { background: #fdf9ee; }
    .ap-flag { font-size: 1.25rem; flex-shrink: 0; }
    .ap-iata { font-size: 0.88rem; font-weight: 800; color: #4f4300; width: 38px; flex-shrink: 0; }
    .ap-info { flex: 1; min-width: 0; }
    .ap-city { font-size: 0.9rem; font-weight: 600; color: #111; }
    .ap-name { font-size: 0.75rem; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ap-check { font-size: 1rem; color: #4f4300; width: 20px; text-align: center; font-weight: 700; }
    .ap-no-results { padding: 0.85rem 1rem; color: #999; font-size: 0.88rem; }

    @media (max-width: 680px) {
      /* Search card */
      .search-card { padding: 0.85rem; }
      .search-wrap  { padding: 0 0.75rem; }
      .fields, .dates-row { grid-template-columns: 1fr; }
      .field input, .dates-row input {
        font-size: 0.95rem;
        width: 100%; max-width: 100%;
        min-width: 0;
      }

      /* Flight rows */
      .row-times { font-size: 1rem; }
      .row-direct, .row-duration { width: 50px; font-size: 0.75rem; }

      /* Card topbar — tighten up */
      .card-topbar { padding: 0.4rem 0.65rem; flex-wrap: nowrap; gap: 0.25rem; }
      .topbar-left  { gap: 0.25rem; }
      .topbar-center { gap: 0.25rem; flex: 1; justify-content: center; }
      .topbar-right { gap: 0.25rem; }
      .icon-btn { width: 28px; height: 28px; font-size: 0.85rem; }
      .share-select-btn { padding: 0.2rem 0.5rem; font-size: 0.7rem; }
      .badge { font-size: 0.65rem; padding: 0.18rem 0.5rem; }
      .luggage-btn { padding: 0.2rem 0.4rem; font-size: 0.7rem; min-width: 36px; }

      /* Stack price panel below flights */
      .card-body { flex-direction: column; }
      .card-price {
        width: 100%;
        border-left: none;
        border-top: 1px solid #ebebeb;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-start;
        padding: 0.65rem 1rem;
        gap: 0.4rem;
      }
      .price-amount { font-size: 1.5rem; flex-shrink: 0; }
      .price-tier   { font-size: 0.72rem; flex-shrink: 0; margin-right: auto; }
      .bekijk-deal-btn, .rental-card-btn, .parkos-card-btn, .unconfirm-btn {
        width: auto !important;
        flex: 1;
        min-width: 80px;
        margin-top: 0 !important;
        font-size: 0.75rem;
        padding: 0.4rem 0.6rem;
      }
    }
  </style>
</head>
<body>

<header>
  <img src="/static/udra-logo.png" alt="UDRA Studio" class="udra-logo" />
  <p>tickets to the edge of things</p>
</header>

<div class="search-wrap">
  <div class="search-card">

    <div class="trip-toggle">
      <button class="trip-btn active" id="btn-roundtrip" onclick="setTrip('roundtrip')">Round-trip</button>
      <button class="trip-btn"        id="btn-oneway"    onclick="setTrip('oneway')">One-way</button>
    </div>

    <div class="fields">
      <div class="field">
        <div class="from-tabs">
          <button class="from-tab active" id="from-tab-nl"   onclick="switchFromTab('nl')">🇳🇱 Netherlands</button>
          <button class="from-tab"        id="from-tab-intl" onclick="switchFromTab('intl')">🌍 International</button>
        </div>
        <label>From</label>
        <div class="ap-wrap" id="ap-from-wrap">
          <div class="ap-box" id="ap-from-box" onclick="apFocus('from')">
            <span class="ap-placeholder" id="ap-from-ph" style="display:none">Select departure airports…</span>
          </div>
          <div class="ap-dropdown" id="ap-from-drop">
            <div class="ap-search-wrap">
              <span class="ap-search-icon">🔍</span>
              <input class="ap-search" id="ap-from-search" placeholder="Search city or airport…" autocomplete="off"
                oninput="apFilter('from')" onkeydown="apKey(event,'from')" />
            </div>
            <div class="ap-list" id="ap-from-list"></div>
          </div>
        </div>
        <input type="hidden" id="origins" value="BRU,EIN,AMS,NRN" />
      </div>
      <div class="field">
        <label>To</label>
        <div class="ap-wrap" id="ap-to-wrap">
          <div class="ap-box" id="ap-to-box" onclick="apFocus('to')">
            <span class="ap-placeholder" id="ap-to-ph" style="display:none">Select destination airports…</span>
          </div>
          <div class="ap-dropdown" id="ap-to-drop">
            <div class="ap-search-wrap">
              <span class="ap-search-icon">🔍</span>
              <input class="ap-search" id="ap-to-search" placeholder="Search city or airport…" autocomplete="off"
                oninput="apFilter('to')" onkeydown="apKey(event,'to')" />
            </div>
            <div class="ap-list" id="ap-to-list"></div>
          </div>
        </div>
        <input type="hidden" id="destinations" value="OPO,SCQ" />
      </div>
    </div>

    <div class="dates-row">
      <div class="field">
        <label>Departure</label>
        <input type="date" id="depart_date" value="2026-04-14" />
      </div>
      <div class="field" id="return-row" style="display:block">
        <label>Return</label>
        <input type="date" id="return_date" value="2026-04-18" />
      </div>
    </div>

    <button class="search-btn" id="search-btn" onclick="doSearch()">Search flights</button>
    <div style="text-align:center;margin-top:0.55rem;">
      <button class="scan-link-btn" id="scanBtn" onclick="scanDeals()">🔍 find cheapest in next 3 months</button>
    </div>
  </div>
</div>
<div id="deals-results" style="max-width:900px;margin:0 auto;padding:0 1rem;"></div>

<div class="tabs-bar">
  <button class="tab-btn active" id="tab-search" onclick="showTab('search')">Search results</button>
  <button class="tab-btn" id="tab-trips" onclick="showTab('trips')">My trips <span class="tab-badge" id="trips-count" style="display:none">0</span></button>
  <button class="tab-btn" id="tab-favs" onclick="showTab('favs')">Favourites <span class="tab-badge-green" id="favs-count" style="display:none">0</span></button>
</div>

<div class="results-wrap" id="results"></div>
<div class="mytrips-wrap" id="favs" style="display:none"></div>
<div class="mytrips-wrap" id="mytrips" style="display:none"></div>

<div id="share-bar">
  <span class="share-count" id="share-count">0 selected</span>
  <button class="share-btn" id="gmail-btn" onclick="shareSelected('email')">✉️ Gmail</button>
  <button class="share-btn" id="copy-btn" onclick="shareSelected('copy')">📸 Share flight card</button>
  <button class="share-clear" onclick="clearSelection()" title="Clear">✕</button>
</div>



<script>
  let tripType = "roundtrip";

  // Cabin bag fee per airline (€). 0 = included in fare.
  const CABIN_BAG_FEE = {
    "ryanair":           35,
    "easyjet":           26,
    "wizz air":          22,
    "vueling":           24,
    "transavia":         18,
    "tap air portugal":   0,
    "tap portugal":       0,
    "klm":                0,
    "brussels airlines":  0,
    "lufthansa":          0,
    "iberia":             0,
    "air europa":         0,
  };

  // Parkos.nl airport slugs (departure airports — where you park your car)
  const PARKOS_SLUGS = {
    "AMS": "parkeren-schiphol",
    "BRU": "parkeren-brussel-zaventem",
    "CRL": "parkeren-brussel-charleroi",
    "EIN": "parkeren-eindhoven-airport",
    "NRN": "parkeren-weeze",
    "OPO": "parkeren-porto-airport",
    "SCQ": "parkeren-santiago-de-compostela",
  };

  function buildParkosUrl(originIata, departDate, departTime, returnDate, returnArrTime) {
    const slug = PARKOS_SLUGS[originIata];
    if (!slug) return null;
    // Parking arrival = 2 hours BEFORE departure (you drop off car before flying out)
    const fmt = t => `${String(t.hour).padStart(2,"0")}:${String(t.minute).padStart(2,"0")}`;
    const arrTime = departTime   ? fmt(timeSubMin(departTime, 120))   : "08:00";
    // Parking departure = 1 hour AFTER return landing (time to collect luggage, drive to lot)
    const doTime  = returnArrTime ? fmt(timeAddMin(returnArrTime, 60)) : "12:00";
    const p = new URLSearchParams({
      location:      slug,
      arrival:       departDate,
      departure:     returnDate || departDate,
      arrivalTime:   arrTime,
      departureTime: doTime,
      sort_f: "prs",
      sort_w: "asc",
    });
    return `https://www.parkos.nl/${slug}/zoeken?${p}`;
  }

  // Airport data for rentalcars.com (name must match their database, coords required)
  const AIRPORTS = {
    "OPO": { name: "Porto Airport",                      coords: "41.236698150634766,-8.670960426330566" },
    "LIS": { name: "Lisbon Humberto Delgado Airport",    coords: "38.781311035156,-9.135921478271" },
    "FAO": { name: "Faro Airport",                       coords: "37.014453,-7.965911" },
    "SCQ": { name: "Santiago de Compostela Airport",     coords: "42.896388,-8.415139" },
    "MAD": { name: "Madrid Barajas Airport",             coords: "40.471926,-3.56264" },
    "BCN": { name: "Barcelona El Prat Airport",          coords: "41.297078,2.078464" },
    "AMS": { name: "Amsterdam Airport Schiphol",         coords: "52.308601,4.763889" },
    "BRU": { name: "Brussels Airport",                   coords: "50.901402,4.48444" },
    "EIN": { name: "Eindhoven Airport",                  coords: "51.450101,5.37452" },
    "NRN": { name: "Weeze Airport",                      coords: "51.602402,6.14217" },
    "CRL": { name: "Brussels South Charleroi Airport",   coords: "50.459202,4.45382" },
  };

  function airlineBookingUrl(r, depart_date, return_date) {
    const a    = (r.airline || "").toLowerCase();
    const o    = r.dep_airport || r.origin;
    const d    = r.arr_airport || r.destination;
    const dep  = depart_date, ret = return_date;
    const isRT = !!ret;

    // Helpers
    const dmy  = s => { const [y,m,dy] = s.split("-"); return `${dy}/${m}/${y}`; };       // DD/MM/YYYY
    const toSky = s => s.replace(/-/g, "").slice(2);                                       // 2026-04-14 → 260414

    // Skyscanner fallback (prefilled, better than booking.com)
    const skyFallback = (() => {
      const base = `https://www.skyscanner.com/transport/flights/${o}/${d}/${toSky(dep)}`;
      return (isRT ? `${base}/${toSky(ret)}/` : `${base}/`) + `?adults=1&cabinclass=economy`;
    })();

    if (a.includes("ryanair")) {
      const p = new URLSearchParams({
        adults: 1, teens: 0, children: 0, infants: 0,
        dateOut: dep, isConnectedFlight: "false", discount: 0, promoCode: "",
        isReturn: isRT ? "true" : "false",
        originIata: o, destinationIata: d,
        tpAdults: 1, tpTeens: 0, tpChildren: 0, tpInfants: 0,
        tpStartDate: dep, tpEndDate: isRT ? ret : dep,
        tpDiscount: 0, tpPromoCode: "",
        tpOriginIata: o, tpDestinationIata: d,
      });
      if (isRT) p.set("dateIn", ret);
      return `https://www.ryanair.com/gb/en/trip/flights/select?${p}`;
    }
    if (a.includes("transavia")) {
      const [oy, om, od] = dep.split("-");
      const p = new URLSearchParams({ ds: o, as: d, ap: 1, cp: 0, od, om, oy });
      if (isRT) {
        const [ry, rm, rd] = ret.split("-");
        p.set("rd", rd); p.set("rm", rm); p.set("ry", ry);
      }
      return `https://www.transavia.com/en-EU/bookingtool/flights/deeplink?${p}`;
    }
    if (a.includes("easyjet")) {
      // EasyJet uses Skyscanner — their own site has no injectable deeplink
      return skyFallback;
    }

    if (a.includes("vueling")) {
      const p = new URLSearchParams({ o, d, dd: dep, dt: isRT ? "2" : "1", adt: 1, chd: 0, inf: 0 });
      if (isRT) p.set("rd", ret);
      return `https://tickets.vueling.com/booking?${p}`;
    }

    if (a.includes("iberia express") || (a.includes("iberia") && !a.includes("air"))) {
      // Iberia deeplink with split date params
      const [dy, dm, dd2] = dep.split("-");
      let url = `https://www.iberia.com/flights/?market=ES&language=en&TRIP_TYPE=${isRT?"2":"1"}&BEGIN_CITY_01=${o}&END_CITY_01=${d}&BEGIN_DAY_01=${dd2}&BEGIN_MONTH_01=${dy}${dm}&BEGIN_YEAR_01=${dy}&FARE_TYPE=R&ADT=1&CHD=0&INF=0`;
      if (isRT) {
        const [ry,rm,rd2] = ret.split("-");
        url += `&END_DAY_01=${rd2}&END_MONTH_01=${ry}${rm}&END_YEAR_01=${ry}`;
      }
      return url + `#!/availability`;
    }

    if (a.includes("air europa")) {
      return skyFallback; // SPA — no injectable deeplink
    }

    if (a.includes("tap") || a.includes("air portugal")) {
      const ddot = s => { const [y,m,dy2] = s.split("-"); return `${dy2}.${m}.${y}`; };
      const p = new URLSearchParams({ market: "NL", origin: o, destination: d, depDate: ddot(dep), flightType: isRT ? "return" : "single", adt: 1, chd: 0, inf: 0, language: "EN" });
      if (isRT) p.set("retDate", ddot(ret));
      return `https://booking.flytap.com/booking/flights/deeplink?${p}`;
    }

    if (a.includes("klm")) {
      return skyFallback; // KLM booking engine is session-only SPA
    }

    if (a.includes("brussels")) {
      return skyFallback; // SPA — no injectable deeplink
    }

    if (a.includes("air france")) {
      const legs = isRT
        ? `${o}:A>${d}:A-${d}:A>${o}:A`
        : `${o}:A>${d}:A`;
      return `https://wwws.airfrance.fr/search/offers?connections=${encodeURIComponent(legs)}&pax=1:0:0:0:0:0:0&market=en_US_us&cabinClass=ECONOMY&bookingFlow=LEISURE&activeConnection=0`;
    }

    if (a.includes("lufthansa")) {
      return skyFallback; // Requires encrypted partner API
    }

    if (a.includes("british airways") || a.startsWith("ba ") || a === "ba") {
      const onds = isRT
        ? `${o}-${d}_${dep}-${d}-${o}_${ret}`
        : `${o}-${d}_${dep}`;
      return `https://www.britishairways.com/travel/book/execclub/_gf/en_gb/flightList?onds=${encodeURIComponent(onds)}`;
    }

    if (a.includes("aer lingus")) {
      const p = new URLSearchParams({
        departureDate_0: dep, destinationAirportCode_0: d, sourceAirportCode_0: o,
        fareCategory: "ECONOMY", fareType: isRT ? "RETURN" : "ONE_WAY",
        groupBooking: "false", numAdults: 1, numChildren: 0, numInfants: 0, numYoungAdults: 0,
      });
      if (isRT) {
        p.set("departureDate_1", ret);
        p.set("destinationAirportCode_1", o);
        p.set("sourceAirportCode_1", d);
      }
      return `https://www.aerlingus.com/app/make/flight-search-result?${p}`;
    }

    if (a.includes("wizz")) {
      return `https://wizzair.com/en-gb/booking/select-flight/${o}/${d}/${dep}/${isRT ? ret : "null"}/1/0/0/`;
    }

    if (a.includes("volotea")) {
      return skyFallback; // SPA — no injectable deeplink
    }

    if (a.includes("norwegian")) {
      const [dy, dm, dd] = dep.split("-");
      const p = new URLSearchParams({
        AdultCount: 1, A_City: d, D_City: o,
        D_Month: `${dy}${dm}`, D_Day: +dd,
        TripType: isRT ? "2" : "1", IncludeTransit: "true",
      });
      if (isRT) { const [ry,rm,rd] = ret.split("-"); p.set("R_Month",`${ry}${rm}`); p.set("R_Day",+rd); }
      return `https://www.norwegian.com/en/low-fare-calendar/?${p}`;
    }

    if (a.includes("jet2")) {
      return skyFallback; // UK-only, no public deeplink
    }

    if (a.includes("swiss")) {
      return skyFallback; // Requires encrypted Lufthansa Group partner API
    }

    if (a.includes("austrian")) {
      return skyFallback; // Requires encrypted Lufthansa Group partner API
    }

    if (a.includes("finnair")) {
      const p = new URLSearchParams({ origin: o, destination: d, outboundDate: dep, adults: 1, tripType: isRT ? "return" : "oneway" });
      if (isRT) p.set("returnDate", ret);
      return `https://www.finnair.com/gb/en/flights?${p}`;
    }
    if (a.includes("condor")) {
      const p = new URLSearchParams({ origin: o, destination: d, outboundDate: dep, adults: 1, tripType: isRT ? "ROUND_TRIP" : "ONE_WAY" });
      if (isRT) p.set("returnDate", ret);
      return `https://www.condor.com/gb/flight-search.jsp?${p}`;
    }
    if (r.booking_token) {
      return `/booking_link?token=${encodeURIComponent(r.booking_token)}&fallback=${encodeURIComponent(fallback)}`;
    }
    return fallback;
  }

  function parseTime(timeStr) {
    if (!timeStr || typeof timeStr !== "string") return null;
    // Handles: "8:30 PM", "08:30", "2026-04-14 08:30", "8:30AM"
    const match = timeStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
    if (!match) return null;
    let hour = parseInt(match[1]);
    const minute = parseInt(match[2]);
    const period = match[3];
    if (period) {
      if (/PM/i.test(period) && hour !== 12) hour += 12;
      if (/AM/i.test(period) && hour === 12) hour = 0;
    }
    return { hour, minute };
  }

  function timeAddMin(timeStr, mins) {
    const t = parseTime(timeStr);
    if (!t) return { hour: 10, minute: 0 };
    const total = t.hour * 60 + t.minute + mins;
    return { hour: Math.floor(total / 60) % 24, minute: total % 60 };
  }

  function timeSubMin(timeStr, mins) {
    const t = parseTime(timeStr);
    if (!t) return { hour: 9, minute: 0 };
    let total = t.hour * 60 + t.minute - mins;
    if (total < 0) total += 24 * 60;
    return { hour: Math.floor(total / 60), minute: total % 60 };
  }

  function buildRentalUrl(iata, puDate, puTime, doDate, doTime) {
    const airport = AIRPORTS[iata] || { name: iata + " Airport", coords: "" };
    const pu  = new Date(puDate + "T00:00:00");
    const doo = new Date(doDate  + "T00:00:00");
    const p   = new URLSearchParams();
    p.append("location",          "");
    p.append("dropLocation",      "");
    p.append("locationName",      airport.name);
    p.append("locationIata",      iata);
    p.append("dropLocationName",  airport.name);
    p.append("dropLocationIata",  iata);
    if (airport.coords) {
      p.append("coordinates",     airport.coords);
      p.append("dropCoordinates", airport.coords);
    }
    p.append("driversAge",  "30");
    p.append("puDay",    pu.getDate());
    p.append("puMonth",  pu.getMonth() + 1);
    p.append("puYear",   pu.getFullYear());
    p.append("puMinute", puTime.minute);
    p.append("puHour",   puTime.hour);
    p.append("doDay",    doo.getDate());
    p.append("doMonth",  doo.getMonth() + 1);
    p.append("doYear",   doo.getFullYear());
    p.append("doMinute", doTime.minute);
    p.append("doHour",   doTime.hour);
    p.append("ftsType",     "A");
    p.append("dropFtsType", "A");
    return `https://www.rentalcars.com/search-results?${p.toString().replace(/\+/g, "%20")}`;
  }

  function rentalUrlForFlight(r, depart_date, return_date) {
    // Pickup: arrival at destination + 20 min (collect luggage etc.)
    const puTime = (r.pu_hour != null)
      ? { hour: r.pu_hour, minute: r.pu_minute ?? 0 }
      : (r.arr_time ? timeAddMin(r.arr_time, 20) : { hour: 10, minute: 0 });
    // Dropoff: return departure - 60 min (return car before flight)
    const doTime = (r.do_hour != null)
      ? { hour: r.do_hour, minute: r.do_minute ?? 0 }
      : (r.ret_dep_time ? timeSubMin(r.ret_dep_time, 60)
         : (r.dep_time  ? timeSubMin(r.dep_time, 60) : { hour: 9, minute: 0 }));
    return buildRentalUrl(r.arr_airport || r.destination, depart_date, puTime, return_date || depart_date, doTime);
  }

  function cabinBagFee(airline) {
    const key = (airline || "").toLowerCase();
    for (const [name, fee] of Object.entries(CABIN_BAG_FEE)) {
      if (key.includes(name)) return fee;
    }
    return null; // unknown airline
  }

  function toGCalDT(dateStr, timeStr) {
    const t = parseTime(timeStr);
    if (!t || !dateStr) return null;
    const [y, m, d] = dateStr.split("-");
    return `${y}${m}${d}T${String(t.hour).padStart(2,"0")}${String(t.minute).padStart(2,"0")}00`;
  }

  async function openCalendar(btn) {
    btn.textContent = "⏳";
    btn.disabled = true;

    // URL will be opened via backend /open_url (bypasses PyWebView restrictions)

    const d = btn.dataset;
    const r = {
      origin: d.origin, destination: d.dest,
      dep_time: d.deptime, arr_time: d.arrtime,
      ret_dep_time: d.retdep, ret_arr_time: d.retarr,
      price: d.price, airline: d.airline,
    };
    const depart_date = d.dep;
    const return_date = d.ret || "";

    let tg = null;
    try {
      const params = new URLSearchParams({
        dep_airport: r.origin, dep_time: r.dep_time, dep_date: depart_date,
        arr_airport: r.destination,
        ret_dep_time: r.ret_dep_time || "",
        ret_dep_date: return_date || "",
      });
      const res = await fetch(`/travel_guide?${params}`);
      tg = await res.json();
    } catch(e) { /* proceed without travel guide */ }

    const leaveTime = tg?.outbound?.leave  || r.dep_time;
    const depStart  = toGCalDT(depart_date, leaveTime);
    const depEnd    = toGCalDT(depart_date, r.arr_time) || toGCalDT(depart_date, r.dep_time);
    const retEnd    = return_date && r.ret_arr_time ? toGCalDT(return_date, r.ret_arr_time) : null;
    const endDT     = retEnd || depEnd;

    const fmtDate = s => { if (!s) return ""; const [y,m,dd] = s.split("-"); return `${dd} ${DUTCH_MONTHS[+m-1]}`; };

    const lines = [`✈ VLUCHT ${r.origin} → ${r.destination}`, r.airline, ""];
    if (tg?.outbound) {
      const o = tg.outbound;
      lines.push(`HEEN — ${fmtDate(depart_date)}`);
      lines.push(`🏠 Vertrek thuis:          ${o.leave}`);
      lines.push(`🚗 Aankomst ${o.dep_airport_name}: ${o.arrive_airport}`);
      lines.push(`🛫 Vertrek:                ${o.departure}`);
      if (r.arr_time) lines.push(`🛬 Aankomst ${o.arr_airport_name}: ${r.arr_time}`);
    } else {
      lines.push(`HEEN — ${fmtDate(depart_date)}`);
      lines.push(`🛫 Vertrek: ${r.dep_time}`);
      if (r.arr_time) lines.push(`🛬 Aankomst: ${r.arr_time}`);
    }
    if (return_date && (tg?.return || r.ret_dep_time)) {
      lines.push("");
      lines.push(`TERUG — ${fmtDate(return_date)}`);
      if (tg?.return) {
        const rv = tg.return;
        lines.push(`🏠 Vertrek Spanje:         ${rv.leave}`);
        lines.push(`🚗 Aankomst ${rv.dep_airport_name}: ${rv.arrive_airport}`);
        lines.push(`🛫 Vertrek:                ${rv.departure}`);
        if (r.ret_arr_time) lines.push(`🛬 Aankomst ${rv.arr_airport_name}: ${r.ret_arr_time}`);
      } else {
        lines.push(`🛫 Vertrek: ${r.ret_dep_time}`);
        if (r.ret_arr_time) lines.push(`🛬 Aankomst: ${r.ret_arr_time}`);
      }
    }

    const title = `✈ ${r.origin} ↔ ${r.destination}`;
    const p = new URLSearchParams({
      action: "TEMPLATE", text: title,
      dates: `${depStart}/${endDT}`,
      details: lines.join("\n"),
      location: `${r.origin} Airport`,
    });

    // Open via backend so it launches in the real system browser
    const calUrl = `https://calendar.google.com/calendar/render?${p}`;
    try {
      await fetch("/open_url", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: calUrl }),
      });
    } catch(e) { window.open(calUrl, "_blank"); }

    btn.textContent = "📅 Agenda";
    btn.disabled = false;
  }

  function initials(name) {
    return name.split(" ").map(w => w[0] || "").join("").slice(0, 3).toUpperCase();
  }

  const AIRLINE_IATA = {
    "ryanair": "FR", "transavia": "HV", "easyjet": "U2", "vueling": "VY",
    "klm": "KL", "tap": "TP", "air portugal": "TP",
    "iberia express": "I2", "iberia": "IB", "air europa": "UX",
    "wizz": "W6", "norwegian": "DY", "aer lingus": "EI",
    "jet2": "LS", "lufthansa": "LH", "british airways": "BA",
    "air france": "AF", "brussels airlines": "SN", "volotea": "V7",
  };

  function airlineLogo(name) {
    const lower = (name || "").toLowerCase();
    let code = null;
    for (const [k, v] of Object.entries(AIRLINE_IATA)) {
      if (lower.includes(k)) { code = v; break; }
    }
    const fb = initials(name);
    if (!code) return fb;
    return `<img src="https://www.gstatic.com/flights/airline_logos/70px/${code}.png"
                 alt="${name}"
                 onerror="this.outerHTML='${fb}'" />`;
  }

  async function doSearch() {
    document.getElementById("scanBtn").style.display = "none";
    const origins      = document.getElementById("origins").value.trim();
    const destinations = document.getElementById("destinations").value.trim();
    const depart_date  = document.getElementById("depart_date").value;
    const return_date  = document.getElementById("return_date").value;

    if (!origins || !destinations || !depart_date) {
      alert("Please fill in origins, destinations, and departure date.");
      return;
    }

    const btn = document.getElementById("search-btn");
    btn.disabled = true;
    btn.textContent = "Searching…";

    document.getElementById("results").innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        Searching all combinations in parallel…
      </div>`;

    try {
      const res = await fetch("/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          origins, destinations, depart_date,
          return_date: tripType === "roundtrip" ? return_date : null,
        })
      });
      const data = await res.json();
      if (data.error) {
        document.getElementById("results").innerHTML = `<div class="error-card">⚠ ${data.error}</div>`;
        return;
      }
      renderAll(data);
      showTab("search");
    } catch(e) {
      document.getElementById("results").innerHTML = `<div class="error-card">⚠ JS Error: ${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "Search flights";
      document.getElementById("scanBtn").style.display = "";
    }
  }

  const DUTCH_DAYS  = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  const DUTCH_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function formatDateSmall(dateStr) {
    if (!dateStr) return "";
    const d   = new Date(dateStr + "T00:00:00");
    const day = DUTCH_DAYS[d.getDay()];
    return `${day} ${d.getDate()} ${DUTCH_MONTHS[d.getMonth()]}`;
  }

  function buildFlightRow(depTime, arrTime, origin, dest, airline, isDirect, stopLabel, duration, date) {
    const times = (depTime && arrTime) ? `${depTime} – ${arrTime}` : depTime || "—";
    const route = `${origin} – ${dest}`;
    const dateLabel = date ? `<span class="row-date-label">${formatDateSmall(date)}</span>` : "";
    return `
      <div class="flight-row">
        <div class="row-logo">${airlineLogo(airline)}</div>
        <div class="row-info">
          <div class="row-times">${times}${dateLabel}</div>
          <div class="row-cities">${route}</div>
        </div>
        <div class="row-direct${isDirect ? "" : " stops"}">${stopLabel}</div>
        <div class="row-duration">${duration}</div>
      </div>`;
  }

  function buildCard(r, depart_date, return_date) {
    const isDirect  = r.stops === 0;
    const stopLabel = isDirect ? "direct" : `${r.stops} stop${r.stops > 1 ? "s" : ""}`;
    const outbound  = buildFlightRow(r.dep_time, r.arr_time, r.origin, r.destination, r.airline, isDirect, stopLabel, r.duration, depart_date);
    const inbound   = r.ret_dep_time
      ? buildFlightRow(r.ret_dep_time, r.ret_arr_time, r.destination, r.origin, r.airline, isDirect, stopLabel, r.duration, return_date)
      : "";
    return outbound + inbound;
  }

  function formatDate(dateStr) {
    if (!dateStr) return "";
    const d   = new Date(dateStr + "T00:00:00");
    const day = DUTCH_DAYS[d.getDay()];
    return `${day} ${d.getDate()} ${DUTCH_MONTHS[d.getMonth()]}`;
  }

  function priceStrip(prices, label) {
    if (!prices || prices.length === 0) return "";
    const pills = prices.map(p => `
      <div class="price-pill${p.selected ? " selected" : ""}">
        <div class="pill-date">${formatDate(p.date)}</div>
        <div class="pill-price">€ ${p.price}</div>
      </div>`).join("");
    return `
      <div class="price-strip">
        <div class="strip-label">${label}</div>
        <div class="strip-pills">${pills}</div>
      </div>`;
  }

  function renderAll(data) {
    document.getElementById("results")._lastData = data; // store for re-render after confirm/unconfirm
    const { results, dep_prices, ret_prices, depart_date, return_date } = data;
    const valid  = results.filter(r => !r.error);
    const failed = results.filter(r =>  r.error);

    let html = "";

    // ── Section 1: flights on searched date ──
    if (valid.length) {
      const label = return_date
        ? `Flights on ${formatDate(depart_date)} → ${formatDate(return_date)}`
        : `Flights on ${formatDate(depart_date)}`;
      html += `<div class="results-meta">
        <strong>${label}</strong>
        <span>${valid.length} result${valid.length !== 1 ? "s" : ""} · sorted by shortest duration</span>
      </div>`;
    }

    const minPrice = Math.min(...valid.map(v => v.price || Infinity));

    valid.forEach((r, i) => {
      const isBest     = i === 0;
      const isCheapest = r.price === minPrice;
      const tripKey = `${r.origin}-${r.destination}-${depart_date}`;
      const badges = isFlightBooked(tripKey)
        ? `<span class="badge badge-booked">✓ Booked</span><button class="unconfirm-btn" onclick="unconfirmFlight('${tripKey}')">✗ Unconfirm</button>`
        : [
            isBest     ? `<span class="badge badge-best">Best option</span>`  : "",
            isCheapest ? `<span class="badge badge-cheapest">Cheapest</span>` : "",
          ].join("");

      const cardData = encodeURIComponent(JSON.stringify({
        origin: r.origin, destination: r.destination,
        dep_airport: r.dep_airport || r.origin, arr_airport: r.arr_airport || r.destination,
        dep_time: r.dep_time, arr_time: r.arr_time,
        ret_dep_time: r.ret_dep_time || "", ret_arr_time: r.ret_arr_time || "",
        depart_date, return_date: return_date || "",
        price: r.price, airline: r.airline, stops: r.stops || 0, duration: r.duration || "",
        pu_hour: r.pu_hour, pu_minute: r.pu_minute,
        do_hour: r.do_hour, do_minute: r.do_minute,
        booking_url: airlineBookingUrl(r, depart_date, return_date),
      }));

      html += `
        <div class="flight-card" data-card='${cardData}'>
          <div class="card-topbar">
            <div class="topbar-left">
              ${(() => {
                const fk = `${r.origin}-${r.destination}-${depart_date}`;
                const faved = isFavorited(fk);
                return `<button class="icon-btn${faved ? " fav-active" : ""}" onclick="toggleFavorite(this,'${fk}')" title="Favourite">♡</button>`;
              })()}
              <button class="share-select-btn" onclick="toggleCard(this.closest('.flight-card'))">Share</button>
            </div>
            <div class="topbar-center">${badges}</div>
            <div class="topbar-right">${(() => {
              const fee = cabinBagFee(r.airline);
              const cabinTag = fee === 0
                ? `<div class="bag-tag included" title="Cabin bag included">🧳 ✓</div>`
                : fee !== null
                  ? `<div class="bag-tag paid" title="Cabin bag costs extra">🧳 +€${fee}</div>`
                  : `<div class="bag-tag unknown" title="Cabin bag allowance unknown">🧳 ?</div>`;
              return `<div class="bag-tag included" title="Personal item always free">🎒 ✓</div>${cabinTag}`;
            })()}</div>
          </div>
          <div class="card-body">
            <div class="card-flights">${buildCard(r, depart_date, return_date)}</div>
            <div class="card-price">
              <div class="price-amount">€ ${r.price ?? "—"}</div>
              ${(() => {
                const fee = cabinBagFee(r.airline);
                return `<div class="price-tier">Basic</div>`;
              })()}
              ${(() => {
                const tripKey = `${r.origin}-${r.destination}-${depart_date}`;
                const booked  = isFlightBooked(tripKey);
                const burl    = airlineBookingUrl(r, depart_date, return_date);
                return `<a class="bekijk-deal-btn" href="${burl}" target="_blank" onclick="confirmFlight(event, this.closest('.flight-card'))">${booked ? "Book again" : "Book"}</a>`;
              })()}
            </div>
          </div>
          <div class="card-footer">${r.airline}</div>
        </div>`;
    });

    const noFlightsByDest = {};
    failed.forEach(r => {
      const oAp     = AP_LIST.find(a => a.iata === r.origin);
      const dAp     = AP_LIST.find(a => a.iata === r.destination);
      const oLabel  = oAp ? `${oAp.city} (${r.origin})` : r.origin;
      const dLabel  = dAp ? `${dAp.city} (${r.destination})` : r.destination;
      const errLower = (r.error || "").toLowerCase();
      const isNoFlights = errLower.includes("no flight") || errLower.includes("no results") || errLower.includes("hasn't returned") || errLower.includes("not found");
      if (!isNoFlights) {
        html += `<div class="error-card">⚠ ${oLabel} → ${dLabel}: ${r.error}</div>`;
        return;
      }
      const key = r.destination;
      if (!noFlightsByDest[key]) noFlightsByDest[key] = { dLabel, origins: [] };
      noFlightsByDest[key].origins.push(oLabel);
    });
    const DIRECT_FROM = {
      "OPO": ["AMS","EIN","NRN","BRU","CRL","LHR","LGW","STN","MAN","BHX","BRS","EDI","GLA","CDG","ORY","LYS","FRA","MUC","DUS","HAM","ZRH","GVA","BCN","MAD","FCO","MXP","DUB","VIE","CPH","OSL","ARN","LIS"],
      "SCQ": ["MAD","BCN","LHR","LGW","STN","FRA","MUC","CDG","ORY","DUB","MXP","GVA","ZRH","FCO","LIS","VIE","BRU","AMS","EDI","CPH"],
      "VGO": ["MAD","BCN","DUB","STN","LHR","LGW","ZRH","GVA","FRA","MUC","LIS","CDG","ORY"],
    };
    Object.entries(noFlightsByDest).forEach(([dest, { dLabel, origins }]) => {
      const searchedIatas = failed.filter(r => r.destination === dest).map(r => r.origin);
      const alts = (DIRECT_FROM[dest] || [])
        .filter(iata => !searchedIatas.includes(iata))
        .slice(0, 6)
        .map(iata => { const ap = AP_LIST.find(a => a.iata === iata); return ap ? `${ap.city} (${iata})` : iata; });
      const altLine = alts.length
        ? `<div class="no-flights-alts">Direct flights to ${dLabel} available from: ${alts.join(", ")}</div>`
        : "";
      html += `
        <div class="no-flights-card">
          <div class="no-flights-title">✈ No direct flights from ${origins.join(", ")} to ${dLabel}</div>
          ${altLine}
        </div>`;
    });

    document.getElementById("results").innerHTML = html || `<div class="error-card">No results found.</div>`;
  }

  async function loadTravelGuide(btn, depAirport, depTime, depDate, arrAirport, arrTime, retDepTime, retArrTime, retDepDate) {

        origin: depAirport, dest: arrAirport,
        deptime: depTime, arrtime: arrTime,
        retdep: retDepTime, retarr: retArrTime,
        price: "", airline: "",
      });

      const html = `
        <div class="tg-cols">
          <div>${leftCol}</div>
          <div>${rightCol}</div>
        </div>
        <div class="tg-footer">
          <button class="tg-cal-btn" onclick="openCalendarFromPanel(this)" data-tg='${encodeURIComponent(calData)}'>📅 Add to calendar</button>
        </div>`;
      panel.innerHTML = html;
      panel.style.display = "block";

    } catch(e) {
      panel.innerHTML = `<div style="color:red">${e.message}</div>`;
      panel.style.display = "block";
    } finally {
      btn.textContent = "🗺 Travel guide";
      btn.disabled = false;
    }
  }

async function openCalendarFromPanel(btn) {
    // Proxy: map panel data attrs → card-style data attrs, then call openCalendar
    const tg = JSON.parse(decodeURIComponent(btn.dataset.tg));
    // Temporarily set dataset on btn so openCalendar can read it
    btn.dataset.dep      = tg.dep;
    btn.dataset.ret      = tg.ret;
    btn.dataset.origin   = tg.origin;
    btn.dataset.dest     = tg.dest;
    btn.dataset.deptime  = tg.deptime;
    btn.dataset.arrtime  = tg.arrtime;
    btn.dataset.retdep   = tg.retdep;
    btn.dataset.retarr   = tg.retarr;
    btn.dataset.price    = tg.price;
    btn.dataset.airline  = tg.airline;
    await openCalendar(btn);
    btn.textContent = "📅 Calendar";
  }

  async function scanDeals() {
    const btn = document.getElementById("scanBtn");
    btn.disabled = true;
    btn.textContent = "⏳ scanning…";
    document.getElementById("deals-results").innerHTML = "";
    try {
      const origins = document.getElementById("origins").value || "AMS,EIN,BRU,NRN";
      const dests   = document.getElementById("destinations").value || "OPO,SCQ";
      const res  = await fetch(`/scan_best_deals?origins=${encodeURIComponent(origins)}&destinations=${encodeURIComponent(dests)}`);
      const data = await res.json();
      const deals = data.deals || [];
      if (!deals.length) {
        document.getElementById("deals-results").innerHTML = `<div class="error-card">No deals found.</div>`;
      } else {
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const fmtDate = s => { const [y,m,d] = s.split("-"); return `${d} ${months[+m-1]} ${y}`; };
        const stayDays = (dep, ret) => Math.round((new Date(ret)-new Date(dep))/(1000*60*60*24));
        let html = `<div class="deals-grid">`;
        deals.forEach(d => {
          const bookUrl = d.booking_token
            ? `/booking_link?token=${encodeURIComponent(d.booking_token)}&fallback=${encodeURIComponent(`https://www.booking.com/flights/search.html?type=ROUNDTRIP&from=${d.origin}&to=${d.destination}&fromDate=${d.depart_date}&toDate=${d.return_date}&adults=1`)}`
            : `https://www.booking.com/flights/search.html?type=ROUNDTRIP&from=${d.origin}&to=${d.destination}&fromDate=${d.depart_date}&toDate=${d.return_date}&adults=1`;
          html += `
            <div class="deal-card">
              <div class="deal-route">${d.origin} → ${d.destination}</div>
              <div class="deal-dates">✈ ${fmtDate(d.depart_date)} → ${fmtDate(d.return_date)} &nbsp;·&nbsp; ${stayDays(d.depart_date, d.return_date)} nights</div>
              <div class="deal-price">€ ${d.price}</div>
              <div class="deal-airline">${d.airline}${d.dep_time ? " · " + d.dep_time : ""}</div>
              <a class="deal-book-btn" href="${bookUrl}" target="_blank">Book</a>
            </div>`;
        });
        html += `</div>`;
        document.getElementById("deals-results").innerHTML = html;
      }
    } catch(e) {
      document.getElementById("deals-results").innerHTML = `<div class="error-card">⚠ ${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "🔍 find cheapest in next 3 months";
    }
  }

  // ── Card selection & sharing ──────────────────────────────────
  function toggleCard(card) {
    card.classList.toggle("selected");
    // sync checkboxes inside this card
    card.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = card.classList.contains("selected"));
    updateShareBar();
  }

  function clearSelection() {
    document.querySelectorAll(".flight-card.selected").forEach(c => {
      c.classList.remove("selected");
      c.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
    });
    updateShareBar();
  }

  function updateShareBar() {
    const n   = document.querySelectorAll(".flight-card.selected").length;
    const bar = document.getElementById("share-bar");
    document.getElementById("share-count").textContent = `${n} flight${n !== 1 ? "s" : ""} selected`;
    bar.classList.toggle("visible", n > 0);
  }

  function formatCard(d) {
    const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const fmt = s => { if (!s) return ""; const [y,m,dd] = s.split("-"); return `${dd} ${M[+m-1]}`; };
    let txt = `✈️ ${d.origin} → ${d.destination}\n`;
    txt += `📅 ${fmt(d.depart_date)}${d.return_date ? " → " + fmt(d.return_date) : ""}\n`;
    if (d.dep_time) txt += `🛫 Outbound: ${d.dep_time}${d.arr_time ? " → " + d.arr_time : ""}\n`;
    if (d.ret_dep_time) txt += `🛬 Return:   ${d.ret_dep_time}${d.ret_arr_time ? " → " + d.ret_arr_time : ""}\n`;
    txt += `💶 € ${d.price}   |   ${d.airline}\n`;
    txt += `🔗 ${d.booking_url}`;
    return txt;
  }

  function getSelectedData() {
    return [...document.querySelectorAll(".flight-card.selected")]
      .map(c => { try { return JSON.parse(decodeURIComponent(c.dataset.card)); } catch { return null; } })
      .filter(Boolean);
  }

  async function shareSelected(method) {
    // On My Trips tab, Gmail shares confirmed bookings; otherwise use selected cards
    const activeTab = document.querySelector(".tab-btn.active")?.id;
    const isTripsTab = activeTab === "tab-trips";
    const cards = isTripsTab ? getTrips() : getSelectedData();
    if (!cards.length) {
      showToast(isTripsTab ? "No confirmed trips to share." : "Select a card first using the Share button.");
      return;
    }

    // ── Copy: render card as image and copy to clipboard ─────────
    if (method === "copy") {
      const cardNodes = [...document.querySelectorAll(".flight-card.selected")];
      if (!cardNodes.length) return;
      const copyBtn = document.getElementById("copy-btn");
      if (copyBtn) { copyBtn.textContent = "⏳ Rendering…"; copyBtn.disabled = true; }
      try {
        const container = document.createElement("div");
        container.style.cssText = "position:fixed;left:-9999px;top:0;background:#f2e9d9;padding:16px;width:680px;border-radius:12px;";
        cardNodes.forEach(node => {
          const clone = node.cloneNode(true);
          clone.classList.remove("selected");
          clone.querySelectorAll("input[type=checkbox]").forEach(cb => cb.remove());
          clone.querySelectorAll(".row-check").forEach(el => el.remove());
          clone.style.marginBottom = "12px";
          container.appendChild(clone);
        });
        document.body.appendChild(container);
        const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: "#f2e9d9", logging: false });
        document.body.removeChild(container);
        canvas.toBlob(async (blob) => {
          // Try server-side clipboard copy first (works in PyWebView / desktop app)
          let copied = false;
          try {
            const b64 = canvas.toDataURL("image/png");
            const res = await fetch("/copy_image", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ image: b64 }),
            });
            const result = await res.json();
            if (result.ok) { copied = true; }
          } catch(e) { /* fall through to browser API */ }

          if (!copied) {
            // Browser clipboard API fallback
            try {
              await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
              copied = true;
            } catch(e) { /* fall through to download */ }
          }

          if (copied) {
            showToast("📋 Image copied — paste anywhere with Cmd+V!");
          } else {
            downloadPng(canvas);
            showToast("📥 Image downloaded — attach it manually.");
          }
          if (copyBtn) { copyBtn.textContent = "📋 Copy image"; copyBtn.disabled = false; }
        }, "image/png");
      } catch(e) {
        alert("Screenshot failed: " + e.message);
        if (copyBtn) { copyBtn.textContent = "📋 Copy"; copyBtn.disabled = false; }
      }
      return;
    }

    // ── Gmail: build styled HTML card, copy to clipboard, open Gmail compose ──
    if (method === "email") {
      const gmailBtn = document.getElementById("gmail-btn");
      if (gmailBtn) { gmailBtn.textContent = "⏳ Preparing…"; gmailBtn.disabled = true; }

      const M    = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const fmtD = s => { if (!s) return ""; const [y,m,d] = s.split("-"); return `${+d} ${M[+m-1]} ${y}`; };
      const tr   = (lbl, val) => val ? `
        <tr>
          <td style="padding:3px 14px 3px 0;font-size:13px;color:#888;white-space:nowrap;">${lbl}</td>
          <td style="padding:3px 0;font-size:13px;color:#1a1a2e;font-weight:600;">${val}</td>
        </tr>` : "";

      // Resolve airline logo URL same way as app
      const iataForEmail = name => {
        const lower = (name||"").toLowerCase();
        for (const [k,v] of Object.entries(AIRLINE_IATA)) { if (lower.includes(k)) return v; }
        return null;
      };
      const logoCell = name => {
        const code = iataForEmail(name);
        const img  = code
          ? `<img src="https://www.gstatic.com/flights/airline_logos/70px/${code}.png" width="44" height="44" style="border-radius:50%;object-fit:cover;display:block;" />`
          : `<div style="width:44px;height:44px;border-radius:50%;background:#f7f4e8;border:1.5px solid #d4c878;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#7a6800;">${name.split(" ").map(w=>w[0]||"").join("").slice(0,3).toUpperCase()}</div>`;
        return `<td style="padding-right:12px;vertical-align:middle;">${img}</td>`;
      };

      const flightRow = (depT, arrT, from, to, airline, direct, duration, date) => `
        <tr>
          ${logoCell(airline)}
          <td style="vertical-align:middle;">
            <div style="font-size:15px;font-weight:700;color:#1a1a2e;">${depT&&arrT?`${depT} – ${arrT}`:depT||"—"} <span style="font-size:11px;color:#aaa;font-weight:400;margin-left:6px;">${date?formatDateSmall(date):""}</span></div>
            <div style="font-size:12px;color:#888;margin-top:2px;">${from} – ${to}</div>
          </td>
          <td style="vertical-align:middle;padding-left:14px;font-size:11px;color:${direct?"#22a645":"#e8430a"};font-weight:600;white-space:nowrap;">${direct?"direct":"stop"}</td>
          <td style="vertical-align:middle;padding-left:14px;font-size:12px;color:#888;white-space:nowrap;">${duration||""}</td>
        </tr>`;

      const cardBlocks = cards.map(card => {
        const origin  = card.dep_airport  || card.origin      || "";
        const dest    = card.arr_airport  || card.destination || "";
        const airline = card.airline || "";
        const direct  = (card.stops === 0) || !card.stops;

        const outRow = flightRow(card.dep_time, card.arr_time, origin, dest, airline, direct, card.duration, card.depart_date);
        const retRow = card.ret_dep_time
          ? flightRow(card.ret_dep_time, card.ret_arr_time, dest, origin, airline, direct, card.duration, card.return_date)
          : "";

        // Travel schedule rows from already-rendered DOM
        const safeKey = (card.key || `${origin}-${dest}-${card.depart_date}`).replace(/[^a-zA-Z0-9]/g,"_");
        const tgEl    = document.getElementById(`mytrip-tg-${safeKey}`);
        const tgRows  = [];
        tgEl?.querySelectorAll(".tg-row").forEach(r => {
          const lbl = r.querySelector(".tg-label")?.textContent?.trim() || "";
          const val = r.querySelector(".tg-value")?.textContent?.trim() || "";
          if (lbl && val) tgRows.push([lbl, val]);
        });
        const scheduleBlock = tgRows.length ? `
          <tr><td colspan="5" style="padding:10px 16px;background:#f7f5ea;border-top:1px solid #e8e2b8;">
            <div style="font-size:10px;font-weight:700;color:#4f4300;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px;">🗓 Travel schedule</div>
            <table cellpadding="0" cellspacing="0">${tgRows.map(([l,v]) => tr(l,v)).join("")}</table>
          </td></tr>` : "";

        return `
        <table cellpadding="0" cellspacing="0"
               style="max-width:560px;width:100%;border:1.5px solid #d4c878;border-radius:12px;overflow:hidden;margin-bottom:20px;font-family:Arial,Helvetica,sans-serif;">
          <!-- Topbar -->
          <tr style="background:#fff;border-bottom:1px solid #ebebeb;">
            <td colspan="5" style="padding:8px 16px;font-size:11px;color:#888;">${airline}</td>
          </tr>
          <!-- Flight rows + price col -->
          <tr>
            <td colspan="4" style="padding:12px 16px;background:#fff;border-right:1px solid #f0f0f0;">
              <table cellpadding="4" cellspacing="0" width="100%">
                ${outRow}${retRow}
              </table>
            </td>
            <td style="padding:12px 20px;background:#f7f5ea;text-align:center;vertical-align:middle;white-space:nowrap;">
              <div style="font-size:22px;font-weight:800;color:#1a1a2e;">€ ${card.price??""}</div>
              <div style="font-size:11px;color:#aaa;margin-bottom:8px;">Basic</div>
              <a href="${card.booking_url||"#"}"
                 style="display:inline-block;background:#4f4300;color:#fff;padding:7px 16px;border-radius:7px;text-decoration:none;font-size:12px;font-weight:700;">Book →</a>
            </td>
          </tr>
          ${scheduleBlock}
          <!-- Footer -->
          <tr style="background:#fafaf5;border-top:1px solid #f0ede0;">
            <td colspan="5" style="padding:6px 16px;font-size:11px;color:#bbb;">${airline} · ${fmtD(card.depart_date)}${card.return_date?" → "+fmtD(card.return_date):""}</td>
          </tr>
        </table>`;
      }).join("");

      const html = `<!DOCTYPE html><html><body style="margin:0;padding:24px;background:#f2e9d9;font-family:Arial,Helvetica,sans-serif;">
        <p style="font-size:14px;color:#555;margin:0 0 16px;">Hi,<br><br>Check out this flight:</p>
        ${cardBlocks}
        <p style="font-size:12px;color:#aaa;margin-top:8px;">Sent via UDRA Flight Planner</p>
      </body></html>`;

      // Copy HTML, open Gmail compose, auto-paste via osascript
      let ok = false;
      try {
        const r = await fetch("/share_email", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ html }),
        });
        ok = (await r.json()).ok;
      } catch(e) {}

      showToast(ok
        ? "✉️ Opening Gmail… card will be pasted automatically"
        : "✉️ Gmail opened — press Cmd+V to paste the card");

      if (gmailBtn) { gmailBtn.textContent = "✉️ Gmail"; gmailBtn.disabled = false; }
      return;
    }
  }

  function buildEmailHtml(enriched) {

  const AP_LIST = Object.values(Object.fromEntries(AP_AIRPORTS.map(a => [a.iata, a])));

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371, toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function nearbyAirports(iata, radiusKm = 200) {
    const base = AP_LIST.find(a => a.iata === iata);
    if (!base || base.lat == null) return [];
    return AP_LIST
      .filter(a => a.iata !== iata && a.lat != null)
      .map(a => ({ ...a, distKm: Math.round(haversineKm(base.lat, base.lon, a.lat, a.lon)) }))
      .filter(a => a.distKm <= radiusKm)
      .sort((a, b) => a.distKm - b.distKm)
      .slice(0, 5);
  }
